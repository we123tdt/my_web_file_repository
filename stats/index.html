<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Audiowide&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <title>访问统计 - AP 工作室</title>
</head>
<style>
    *{ margin: 0; padding: 0; box-sizing: border-box; }
    body{
        background-color: #0f172a;
        font-family: 'Noto Sans SC', 'Orbitron', 'Audiowide', sans-serif;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
    }
    ::-webkit-scrollbar{ width: 10px; }
    ::-webkit-scrollbar-track{ background: #1e293b; }
    ::-webkit-scrollbar-thumb{ background: linear-gradient(180deg, #87CEEB, #ADD8E6); border-radius: 5px; }

    .navbar{
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.95));
        backdrop-filter: blur(10px); display: flex; align-items: center;
        justify-content: space-between; padding: 0 20px;
        box-shadow: 0 2px 20px rgba(76,169,250,0.3); z-index: 9999;
        border-bottom: 1px solid rgba(135,206,235,0.3);
    }
    .navbar-title{
        color: rgb(135,206,235); font-size: 20px; font-weight: bold;
        text-shadow: 0 0 10px rgba(135,206,235,0.5); letter-spacing: 2px;
    }
    .navbar-right{ display: flex; align-items: center; gap: 12px; }
    .nav-btn{
        padding: 8px 16px; font-size: 14px; font-weight: bold; font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6); color: #0f172a;
        border: none; border-radius: 20px; cursor: pointer; text-decoration: none;
        box-shadow: 0 0 10px rgba(135,206,235,0.6);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .nav-btn:hover{ transform: scale(1.05); box-shadow: 0 0 20px rgba(135,206,235,0.8); }

    .container{ max-width: 1000px; margin: 80px auto 40px; padding: 0 20px; }

    h1{
        color: rgb(76,169,250); text-shadow: 0 0 20px rgb(76,169,250);
        text-align: center; margin-bottom: 10px; font-size: 36px;
    }
    h2{
        color: rgb(224,207,16); text-shadow: 0 0 20px rgb(224,207,16);
        text-align: center; margin-bottom: 30px; font-size: 18px;
    }

    /* 统计卡片 */
    .stats-grid{
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
    }
    .stat-card{
        background: linear-gradient(135deg, rgba(30,41,59,0.9), rgba(15,23,42,0.9));
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 15px;
        padding: 25px;
        text-align: center;
        transition: all 0.3s ease;
    }
    .stat-card:hover{
        border-color: rgba(135,206,235,0.6);
        box-shadow: 0 0 25px rgba(135,206,235,0.2);
        transform: translateY(-3px);
    }
    .stat-icon{
        font-size: 36px;
        margin-bottom: 10px;
    }
    .stat-label{
        color: #64748b;
        font-size: 13px;
        margin-bottom: 8px;
        letter-spacing: 1px;
    }
    .stat-value{
        color: #87CEEB;
        font-size: 32px;
        font-weight: bold;
        font-family: 'Orbitron', monospace;
        text-shadow: 0 0 15px rgba(135,206,235,0.5);
    }
    .stat-sub{
        color: #475569;
        font-size: 12px;
        margin-top: 5px;
    }

    /* 图表容器 */
    .chart-container{
        background: linear-gradient(135deg, rgba(30,41,59,0.9), rgba(15,23,42,0.9));
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 15px;
        padding: 25px;
        margin-bottom: 30px;
    }
    .chart-title{
        color: #94a3b8;
        font-size: 16px;
        margin-bottom: 20px;
        text-align: center;
        letter-spacing: 2px;
    }
    .chart-wrapper{
        position: relative;
        height: 300px;
    }

    /* 访客列表 */
    .recent-section{
        background: linear-gradient(135deg, rgba(30,41,59,0.9), rgba(15,23,42,0.9));
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 15px;
        padding: 25px;
    }
    .recent-title{
        color: #94a3b8;
        font-size: 16px;
        margin-bottom: 15px;
        letter-spacing: 2px;
    }
    .recent-item{
        display: flex;
        justify-content: space-between;
        padding: 10px 0;
        border-bottom: 1px solid rgba(135,206,235,0.1);
        font-size: 14px;
    }
    .recent-item:last-child{ border-bottom: none; }
    .recent-page{ color: #cbd5e1; }
    .recent-time{ color: #475569; font-size: 12px; font-family: 'Courier New', monospace; }

    .empty-state{
        text-align: center;
        padding: 40px;
        color: #475569;
    }
    .empty-state .icon{ font-size: 48px; margin-bottom: 15px; }

    @media (max-width: 600px){
        h1{ font-size: 24px; }
        .stats-grid{ grid-template-columns: 1fr 1fr; }
        .stat-value{ font-size: 24px; }
    }
</style>
<body>
    <div class="navbar">
        <div class="navbar-title">📊 访问统计</div>
        <div class="navbar-right">
            <a href="/" class="nav-btn">🏠 主页</a>
        </div>
    </div>

    <div class="container">
        <h1>📊 访问统计</h1>
        <h2>了解你的访客</h2>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon">👥</div>
                <div class="stat-label">总访客</div>
                <div class="stat-value" id="totalVisitors">--</div>
                <div class="stat-sub">累计访问人数</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🟢</div>
                <div class="stat-label">当前在线</div>
                <div class="stat-value" id="onlineNow">--</div>
                <div class="stat-sub">最近 30 秒活跃</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📝</div>
                <div class="stat-label">留言总数</div>
                <div class="stat-value" id="totalMessages">--</div>
                <div class="stat-sub">来自访客的留言</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-label">今日访问</div>
                <div class="stat-value" id="todayVisits">--</div>
                <div class="stat-sub">本日累计</div>
            </div>
        </div>

        <!-- 访问趋势图 -->
        <div class="chart-container">
            <div class="chart-title">📈 访问趋势（最近 15 天）</div>
            <div class="chart-wrapper">
                <canvas id="visitChart"></canvas>
            </div>
        </div>

        <!-- 页面分布图 -->
        <div class="chart-container">
            <div class="chart-title">📊 页面访问分布</div>
            <div class="chart-wrapper">
                <canvas id="pageChart"></canvas>
            </div>
        </div>

        <!-- 最近访问 -->
        <div class="recent-section">
            <div class="recent-title">🕐 最近访问记录</div>
            <div id="recentVisits">
                <div class="empty-state">
                    <div class="icon">📡</div>
                    <p>等待访问数据...</p>
                </div>
            </div>
        </div>
    </div>

<script>
    // ========== 页面名称映射 ==========
    const pageNameMap = {
        '/': '主页',
        '/links/': '导航',
        '/gallery/': '画廊',
        '/games/': '游戏',
        '/chat/': 'AI 聊天',
        '/time/': '时光机',
        '/weather/': '天气',
        '/messages/': '留言板',
        '/stats/': '统计',
        '/music/': '音乐',
        '/files.html': '文件',
        '/upload.html': '上传'
    };

    const chartColors = [
        '#87CEEB', '#60a5fa', '#4ade80', '#fbbf24',
        '#a78bfa', '#f472b6', '#2dd4bf', '#f87171', '#94a3b8',
        '#fb923c', '#34d399'
    ];

    let visitChart = null;
    let pageChart = null;

    // ========== 记录本次访问 ==========
    async function recordVisit() {
        try {
            const path = window.location.pathname;
            const pageName = pageNameMap[path] || path;
            await fetch('/api/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ page: path, pageName })
            });
        } catch (e) { /* 静默失败 */ }
    }

    // ========== 获取统计数据并更新所有UI ==========
    async function loadAllStats() {
        // 独立请求每个 API，一个失败不影响其他
        async function safeFetch(url, fallback) {
            try {
                const res = await fetch(url, { cache: 'no-store' });
                if (!res.ok) throw new Error('HTTP ' + res.status);
                return await res.json();
            } catch (e) {
                console.warn('API ' + url + ' 请求失败:', e.message);
                return fallback;
            }
        }

        const [visitorData, onlineData, msgData, statsData] = await Promise.all([
            safeFetch('/api/visitor', { count: 0 }),
            safeFetch('/api/online-users', { count: 0 }),
            safeFetch('/api/messages', { messages: [] }),
            safeFetch('/api/stats', { dailyVisits: {}, pageVisits: {}, recentVisits: [], todayVisits: 0 })
        ]);

        // 更新卡片
        document.getElementById('totalVisitors').textContent = (visitorData.count || 0).toLocaleString();
        document.getElementById('onlineNow').textContent = onlineData.count || '0';
        document.getElementById('totalMessages').textContent = (msgData.messages || []).length || '0';
        document.getElementById('todayVisits').textContent = statsData.todayVisits || '0';

        // 更新图表
        updateVisitChart(statsData.dailyVisits || {});
        updatePageChart(statsData.pageVisits || {});
        updateRecentVisits(statsData.recentVisits || []);
    }

    // ========== 更新访问趋势图 ==========
    function updateVisitChart(dailyVisits) {
        try {
            const canvas = document.getElementById('visitChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');

            // 生成最近 15 天的标签和数据
            const days = [];
            const visits = [];
            const now = new Date();
            const raw = dailyVisits && typeof dailyVisits === 'object' ? dailyVisits : {};
            for (let i = 14; i >= 0; i--) {
                const d = new Date(now);
                d.setDate(d.getDate() - i);
                const key = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                days.push(`${d.getMonth() + 1}/${d.getDate()}`);
                visits.push(raw[key] || 0);
            }

            const hasData = visits.some(v => v > 0);

            if (visitChart) visitChart.destroy();

            const gradient = ctx.createLinearGradient(0, 0, 0, 300);
            gradient.addColorStop(0, 'rgba(135, 206, 235, 0.3)');
            gradient.addColorStop(1, 'rgba(135, 206, 235, 0)');

            visitChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: days,
                    datasets: [{
                        label: '访问量',
                        data: visits,
                        borderColor: '#87CEEB',
                        backgroundColor: gradient,
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4,
                        pointBackgroundColor: '#87CEEB',
                        pointBorderColor: '#0f172a',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            callbacks: {
                                label: ctx => hasData ? `${ctx.parsed.y} 次访问` : '暂无数据'
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { color: 'rgba(135, 206, 235, 0.1)' },
                            ticks: { color: '#64748b', font: { size: 11 } }
                        },
                        y: {
                            grid: { color: 'rgba(135, 206, 235, 0.1)' },
                            ticks: {
                                color: '#64748b',
                                font: { size: 11 },
                                stepSize: hasData ? undefined : 1,
                                precision: 0
                            },
                            beginAtZero: true
                        }
                    }
                }
            });
        } catch (e) {
            console.warn('访问趋势图渲染失败:', e.message);
        }
    }

    // ========== 更新页面分布图 ==========
    function updatePageChart(pageVisits) {
        try {
            const canvas = document.getElementById('pageChart');
            if (!canvas) return;
            const ctx = canvas.getContext('2d');
            if (pageChart) pageChart.destroy();

            // 按访问量排序，取前10
            const raw = pageVisits && typeof pageVisits === 'object' ? pageVisits : {};
            const entries = Object.entries(raw)
                .map(([path, count]) => ({
                    name: pageNameMap[path] || path.replace(/^\//, '').replace(/\/$/, '') || '主页',
                    count: Number(count) || 0
                }))
                .sort((a, b) => b.count - a.count)
                .slice(0, 10);

            // 如果没有任何数据，显示占位
            if (entries.length === 0) {
                entries.push({ name: '暂无数据', count: 1 });
            }

            const labels = entries.map(e => e.name);
            const data = entries.map(e => e.count);
            const colors = entries.map((_, i) => chartColors[i % chartColors.length]);

            pageChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels,
                    datasets: [{
                        data,
                        backgroundColor: colors,
                        borderColor: '#0f172a',
                        borderWidth: 2,
                        hoverOffset: 10
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: {
                            position: 'right',
                            labels: {
                                color: '#94a3b8',
                                font: { size: 12 },
                                padding: 15,
                                generateLabels: function(chart) {
                                    const original = Chart.defaults.plugins.legend.labels.generateLabels(chart);
                                    return original.map(label => ({
                                        ...label,
                                        text: `${label.text} (${chart.data.datasets[0].data[label.index] || 0})`
                                    }));
                                }
                            }
                        }
                    }
                }
            });
        } catch (e) {
            console.warn('页面分布图渲染失败:', e.message);
        }
    }

    // ========== 更新最近访问记录 ==========
    function updateRecentVisits(records) {
        const container = document.getElementById('recentVisits');

        // 同时保留 localStorage 作为补充，合并去重
        let localRecords = [];
        try {
            const saved = localStorage.getItem('visitRecords');
            if (saved) localRecords = JSON.parse(saved);
        } catch (e) {}

        // 合并：服务端记录 + 本地记录，取最近 20 条，去重
        const allRecords = [...records, ...localRecords];
        const seen = new Set();
        const merged = [];
        for (const r of allRecords) {
            const key = `${r.page}_${r.time}`;
            if (!seen.has(key)) {
                seen.add(key);
                merged.push(r);
            }
        }
        merged.sort((a, b) => new Date(b.time) - new Date(a.time));
        const display = merged.slice(0, 20);

        if (display.length === 0) {
            container.innerHTML = `
                <div class="empty-state">
                    <div class="icon">📡</div>
                    <p>还没有访问记录，数据会随着访问自动积累</p>
                </div>
            `;
            return;
        }

        container.innerHTML = display.map(r => {
            const d = new Date(r.time);
            const timeStr = `${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}:${String(d.getSeconds()).padStart(2,'0')}`;
            return `
                <div class="recent-item">
                    <span class="recent-page">${r.pageName || r.page || '未知'}</span>
                    <span class="recent-time">${timeStr}</span>
                </div>
            `;
        }).join('');
    }

    // ========== 初始化 ==========
    recordVisit().then(() => loadAllStats());

    // 每 30 秒刷新统计数据
    setInterval(loadAllStats, 30000);
</script>
</body>
</html>

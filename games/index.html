<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Audiowide&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <title>小游戏 - AP 工作室</title>
</head>
<style>
    *{ margin: 0; padding: 0; box-sizing: border-box; }
    body{
        background-color: #0f172a;
        font-family: 'Noto Sans SC', 'Orbitron', 'Audiowide', sans-serif;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
    }
    ::-webkit-scrollbar{ width: 10px; }
    ::-webkit-scrollbar-track{ background: #1e293b; }
    ::-webkit-scrollbar-thumb{ background: linear-gradient(180deg, #87CEEB, #ADD8E6); border-radius: 5px; }

    .navbar{
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.95));
        backdrop-filter: blur(10px); display: flex; align-items: center;
        justify-content: space-between; padding: 0 20px;
        box-shadow: 0 2px 20px rgba(76,169,250,0.3); z-index: 9999;
        border-bottom: 1px solid rgba(135,206,235,0.3);
    }
    .navbar-title{
        color: rgb(135,206,235); font-size: 20px; font-weight: bold;
        text-shadow: 0 0 10px rgba(135,206,235,0.5); letter-spacing: 2px;
    }
    .navbar-right{ display: flex; align-items: center; gap: 12px; }
    .nav-btn{
        padding: 8px 16px; font-size: 14px; font-weight: bold; font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6); color: #0f172a;
        border: none; border-radius: 20px; cursor: pointer; text-decoration: none;
        box-shadow: 0 0 10px rgba(135,206,235,0.6);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .nav-btn:hover{ transform: scale(1.05); box-shadow: 0 0 20px rgba(135,206,235,0.8); }

    .container{ max-width: 500px; margin: 80px auto 40px; padding: 0 20px; text-align: center; }

    h1{
        color: rgb(76,169,250); text-shadow: 0 0 20px rgb(76,169,250);
        margin-bottom: 5px; font-size: 32px;
    }
    h2{
        color: rgb(224,207,16); text-shadow: 0 0 20px rgb(224,207,16);
        margin-bottom: 20px; font-size: 16px;
    }

    /* 游戏标签页 */
    .game-tabs{
        display: flex; justify-content: center; gap: 10px; flex-wrap: wrap; margin-bottom: 20px;
    }
    .game-tab{
        padding: 8px 20px; font-size: 14px; font-family: inherit; font-weight: bold;
        background: rgba(15,23,42,0.8); color: #94a3b8;
        border: 1px solid rgba(135,206,235,0.2); border-radius: 50px;
        cursor: pointer; transition: all 0.3s ease;
    }
    .game-tab:hover{ color: #87CEEB; border-color: rgba(135,206,235,0.5); }
    .game-tab.active{
        color: #0f172a; background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        border-color: transparent; box-shadow: 0 0 15px rgba(135,206,235,0.3);
    }
    .game-content{ display: none; }
    .game-content.active{ display: block; }

    /* ===== 2048 ===== */
    .score-board{
        display: flex; justify-content: center; gap: 20px; margin-bottom: 15px;
    }
    .score-box{
        background: rgba(30,41,59,0.8); border: 1px solid rgba(135,206,235,0.3);
        border-radius: 10px; padding: 10px 20px; min-width: 100px;
    }
    .score-label{ color: #64748b; font-size: 12px; }
    .score-value{ color: #87CEEB; font-size: 24px; font-weight: bold; font-family: 'Orbitron', monospace; text-shadow: 0 0 10px rgba(135,206,235,0.5); }
    .grid-container{
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 8px;
        background: rgba(30,41,59,0.6);
        border: 2px solid rgba(135,206,235,0.3);
        border-radius: 10px;
        padding: 8px;
        max-width: 400px;
        margin: 0 auto;
        aspect-ratio: 1;
    }
    .grid-cell{
        background: rgba(15,23,42,0.8);
        border-radius: 5px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: bold;
        font-family: 'Orbitron', monospace;
        font-size: 28px;
        transition: all 0.1s ease;
        aspect-ratio: 1;
    }
    .cell-2{ background: #1e293b; color: #e2e8f0; }
    .cell-4{ background: #1e3a5f; color: #e2e8f0; }
    .cell-8{ background: #1e5f5f; color: #fff; }
    .cell-16{ background: #1e7f7f; color: #fff; }
    .cell-32{ background: #1e9f7f; color: #fff; }
    .cell-64{ background: #1ebf5f; color: #fff; }
    .cell-128{ background: #87CEEB; color: #0f172a; font-size: 24px; }
    .cell-256{ background: #76b5d5; color: #0f172a; font-size: 24px; }
    .cell-512{ background: #65a0c0; color: #0f172a; font-size: 24px; }
    .cell-1024{ background: #5488aa; color: #fff; font-size: 20px; }
    .cell-2048{ background: #437095; color: #fff; font-size: 20px; box-shadow: 0 0 30px rgba(135,206,235,0.5); }
    .cell-super{ background: #ff00ff; color: #fff; font-size: 18px; box-shadow: 0 0 30px rgba(255,0,255,0.5); }

    .game-controls{
        display: flex; justify-content: center; gap: 10px; margin-top: 15px; flex-wrap: wrap;
    }
    .game-btn{
        padding: 10px 24px; font-size: 14px; font-weight: bold; font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6); color: #0f172a;
        border: none; border-radius: 25px; cursor: pointer;
        box-shadow: 0 0 15px rgba(135,206,235,0.4);
        transition: all 0.3s ease;
    }
    .game-btn:hover{ transform: scale(1.05); box-shadow: 0 0 25px rgba(135,206,235,0.6); }
    .game-btn:active{ transform: scale(0.95); }

    .game-hint{
        color: #64748b; font-size: 13px; margin-top: 10px;
    }

    /* 移动端方向键 */
    .mobile-controls{
        display: none;
        grid-template-columns: repeat(3, 60px);
        gap: 5px;
        justify-content: center;
        margin-top: 15px;
    }
    .mobile-btn{
        width: 60px; height: 60px;
        background: rgba(30,41,59,0.8);
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 10px;
        color: #87CEEB;
        font-size: 24px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s ease;
        user-select: none;
        -webkit-user-select: none;
    }
    .mobile-btn:active{ background: rgba(135,206,235,0.3); transform: scale(0.9); }
    .mobile-up{ grid-column: 2; }
    .mobile-left{ grid-column: 1; grid-row: 2; }
    .mobile-right{ grid-column: 3; grid-row: 2; }
    .mobile-down{ grid-column: 2; grid-row: 3; }

    @media (max-width: 600px){
        .mobile-controls{ display: grid; }
        .grid-cell{ font-size: 20px; }
        .cell-128, .cell-256, .cell-512{ font-size: 18px; }
        .cell-1024, .cell-2048, .cell-super{ font-size: 14px; }
    }

    /* ===== 猜数字 ===== */
    .guess-game{
        max-width: 400px; margin: 0 auto;
    }
    .guess-range{
        color: #94a3b8; font-size: 14px; margin-bottom: 15px;
    }
    .guess-input-row{
        display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;
    }
    .guess-input{
        padding: 12px 16px; font-size: 18px; font-family: 'Orbitron', monospace;
        background: rgba(30,41,59,0.8); border: 2px solid rgba(135,206,235,0.3);
        border-radius: 10px; color: #fff; outline: none; width: 120px; text-align: center;
    }
    .guess-input:focus{ border-color: rgb(76,169,250); box-shadow: 0 0 20px rgba(76,169,250,0.3); }
    .guess-history{
        margin-top: 20px; text-align: left;
    }
    .guess-item{
        display: flex; justify-content: space-between; padding: 8px 12px;
        border-bottom: 1px solid rgba(135,206,235,0.1);
        font-size: 14px;
    }
    .guess-num{ font-family: 'Orbitron', monospace; color: #87CEEB; }
    .guess-result-low{ color: #f87171; }
    .guess-result-high{ color: #fbbf24; }
    .guess-result-correct{ color: #4ade80; font-weight: bold; }
    .guess-attempts{ color: #64748b; font-size: 12px; margin-top: 10px; }

    /* ===== 扫雷 ===== */
    .mine-grid{
        display: inline-grid;
        gap: 2px;
        background: rgba(30,41,59,0.6);
        border: 2px solid rgba(135,206,235,0.3);
        border-radius: 8px;
        padding: 5px;
    }
    .mine-cell{
        width: 36px; height: 36px;
        background: rgba(15,23,42,0.8);
        border: 1px solid rgba(135,206,235,0.2);
        border-radius: 4px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        font-weight: bold;
        font-family: 'Orbitron', monospace;
        transition: all 0.2s ease;
        user-select: none;
    }
    .mine-cell:hover{ background: rgba(30,41,59,0.9); }
    .mine-cell.revealed{ background: rgba(15,23,42,0.5); cursor: default; }
    .mine-cell.mine{ background: rgba(239,68,68,0.3); }
    .mine-cell.flagged{ background: rgba(251,191,36,0.2); }
    .mine-n1{ color: #60a5fa; }
    .mine-n2{ color: #4ade80; }
    .mine-n3{ color: #f87171; }
    .mine-n4{ color: #a78bfa; }
    .mine-n5{ color: #fbbf24; }
    .mine-n6{ color: #2dd4bf; }
    .mine-n7{ color: #f472b6; }
    .mine-n8{ color: #94a3b8; }

    .mine-info{
        display: flex; justify-content: center; gap: 20px; margin-bottom: 10px;
    }
    .mine-info-item{
        color: #94a3b8; font-size: 14px;
    }
    .mine-info-item span{
        color: #87CEEB; font-weight: bold; font-family: 'Orbitron', monospace;
    }

    @media (max-width: 500px){
        .mine-cell{ width: 28px; height: 28px; font-size: 12px; }
    }
</style>
<body>
    <div class="navbar">
        <div class="navbar-title">🎮 小游戏</div>
        <div class="navbar-right">
            <a href="/" class="nav-btn">🏠 主页</a>
        </div>
    </div>

    <div class="container">
        <h1>🎮 小游戏</h1>
        <h2>放松一下，玩个游戏吧</h2>

        <div class="game-tabs">
            <button class="game-tab active" onclick="switchGame('2048', event)">2048</button>
            <button class="game-tab" onclick="switchGame('guess', event)">🔢 猜数字</button>
            <button class="game-tab" onclick="switchGame('mine', event)">💣 扫雷</button>
        </div>

        <!-- 2048 -->
        <div class="game-content active" id="game-2048">
            <div class="score-board">
                <div class="score-box">
                    <div class="score-label">分数</div>
                    <div class="score-value" id="score2048">0</div>
                </div>
                <div class="score-box">
                    <div class="score-label">最高</div>
                    <div class="score-value" id="best2048">0</div>
                </div>
            </div>
            <div class="grid-container" id="grid2048"></div>
            <div class="game-controls">
                <button class="game-btn" onclick="newGame2048()">🔄 新游戏</button>
            </div>
            <div class="game-hint">使用方向键 / WASD 移动，合并相同数字</div>
            <div class="mobile-controls" id="mobile2048">
                <div class="mobile-btn mobile-up" onclick="move2048('up')">↑</div>
                <div class="mobile-btn mobile-left" onclick="move2048('left')">←</div>
                <div class="mobile-btn mobile-right" onclick="move2048('right')">→</div>
                <div class="mobile-btn mobile-down" onclick="move2048('down')">↓</div>
            </div>
        </div>

        <!-- 猜数字 -->
        <div class="game-content" id="game-guess">
            <div class="guess-game">
                <div class="guess-range" id="guessRange">猜一个 1-100 之间的数字</div>
                <div class="guess-input-row">
                    <input type="number" class="guess-input" id="guessInput" min="1" max="100" onkeydown="if(event.key==='Enter')makeGuess()">
                    <button class="game-btn" onclick="makeGuess()">猜！</button>
                </div>
                <div class="game-controls" style="margin-top:10px;">
                    <button class="game-btn" onclick="newGuessGame()">🔄 新一局</button>
                </div>
                <div class="guess-history" id="guessHistory"></div>
                <div class="guess-attempts" id="guessAttempts"></div>
            </div>
        </div>

        <!-- 扫雷 -->
        <div class="game-content" id="game-mine">
            <div class="mine-info">
                <div class="mine-info-item">💣 雷: <span id="mineCount">10</span></div>
                <div class="mine-info-item">🚩 标记: <span id="flagCount">0</span></div>
            </div>
            <div id="mineGrid"></div>
            <div class="game-controls">
                <button class="game-btn" onclick="newMineGame()">🔄 新游戏</button>
                <button class="game-btn" onclick="toggleMineMode()" id="mineModeBtn">🚩 标记模式</button>
            </div>
            <div class="game-hint" id="mineHint">左键翻开，右键标记地雷</div>
        </div>
    </div>

<script>
    // ========== 游戏切换 ==========
    function switchGame(game, e){
        document.querySelectorAll('.game-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.game-content').forEach(c => c.classList.remove('active'));
        e.target.classList.add('active');
        document.getElementById('game-' + game).classList.add('active');
    }

    // ==================== 2048 ====================
    let grid2048 = [];
    let score2048 = 0;
    let best2048 = parseInt(localStorage.getItem('best2048')) || 0;
    let gameOver2048 = false;

    function init2048(){
        grid2048 = Array(4).fill(null).map(() => Array(4).fill(0));
        score2048 = 0;
        gameOver2048 = false;
        addRandom2048();
        addRandom2048();
        render2048();
        document.getElementById('best2048').textContent = best2048;
    }

    function addRandom2048(){
        const empty = [];
        for(let r = 0; r < 4; r++)
            for(let c = 0; c < 4; c++)
                if(grid2048[r][c] === 0) empty.push([r, c]);
        if(empty.length === 0) return;
        const [r, c] = empty[Math.floor(Math.random() * empty.length)];
        grid2048[r][c] = Math.random() < 0.9 ? 2 : 4;
    }

    function render2048(){
        const grid = document.getElementById('grid2048');
        grid.innerHTML = '';
        for(let r = 0; r < 4; r++){
            for(let c = 0; c < 4; c++){
                const cell = document.createElement('div');
                cell.className = 'grid-cell';
                const val = grid2048[r][c];
                if(val > 0){
                    cell.textContent = val;
                    if(val <= 2048) cell.classList.add('cell-' + val);
                    else cell.classList.add('cell-super');
                }
                grid.appendChild(cell);
            }
        }
        document.getElementById('score2048').textContent = score2048;
    }

    function slideRow(row){
        let arr = row.filter(v => v !== 0);
        let newArr = [];
        let added = false;
        for(let i = 0; i < arr.length; i++){
            if(i + 1 < arr.length && arr[i] === arr[i+1] && !added){
                newArr.push(arr[i] * 2);
                score2048 += arr[i] * 2;
                added = true;
                i++;
            } else {
                newArr.push(arr[i]);
                added = false;
            }
        }
        while(newArr.length < 4) newArr.push(0);
        return newArr;
    }

    function move2048(direction){
        if(gameOver2048) return;
        let moved = false;
        const old = JSON.stringify(grid2048);

        if(direction === 'left'){
            for(let r = 0; r < 4; r++) grid2048[r] = slideRow(grid2048[r]);
        } else if(direction === 'right'){
            for(let r = 0; r < 4; r++){ grid2048[r].reverse(); grid2048[r] = slideRow(grid2048[r]); grid2048[r].reverse(); }
        } else if(direction === 'up'){
            for(let c = 0; c < 4; c++){
                const col = [grid2048[0][c], grid2048[1][c], grid2048[2][c], grid2048[3][c]];
                const newCol = slideRow(col);
                for(let r = 0; r < 4; r++) grid2048[r][c] = newCol[r];
            }
        } else if(direction === 'down'){
            for(let c = 0; c < 4; c++){
                const col = [grid2048[3][c], grid2048[2][c], grid2048[1][c], grid2048[0][c]];
                const newCol = slideRow(col);
                for(let r = 0; r < 4; r++) grid2048[3-r][c] = newCol[r];
            }
        }

        if(JSON.stringify(grid2048) !== old){
            moved = true;
            addRandom2048();
            render2048();
            if(score2048 > best2048){
                best2048 = score2048;
                localStorage.setItem('best2048', best2048);
                document.getElementById('best2048').textContent = best2048;
            }
            if(!canMove2048()){
                gameOver2048 = true;
                setTimeout(() => alert('游戏结束！得分：' + score2048), 100);
            }
        }
    }

    function canMove2048(){
        for(let r = 0; r < 4; r++)
            for(let c = 0; c < 4; c++){
                if(grid2048[r][c] === 0) return true;
                if(c < 3 && grid2048[r][c] === grid2048[r][c+1]) return true;
                if(r < 3 && grid2048[r][c] === grid2048[r+1][c]) return true;
            }
        return false;
    }

    function newGame2048(){ init2048(); }

    document.addEventListener('keydown', function(e){
        const g = document.getElementById('game-2048');
        if(!g.classList.contains('active')) return;
        const map = { 'ArrowUp': 'up', 'ArrowDown': 'down', 'ArrowLeft': 'left', 'ArrowRight': 'right', 'w': 'up', 's': 'down', 'a': 'left', 'd': 'right' };
        const dir = map[e.key];
        if(dir){ e.preventDefault(); move2048(dir); }
    });

    // ==================== 猜数字 ====================
    let guessNumber = 0;
    let guessAttempts = 0;
    let guessHistory = [];
    let guessMax = 100;

    function newGuessGame(){
        guessNumber = Math.floor(Math.random() * 100) + 1;
        guessAttempts = 0;
        guessHistory = [];
        document.getElementById('guessRange').textContent = '猜一个 1-100 之间的数字';
        document.getElementById('guessHistory').innerHTML = '';
        document.getElementById('guessAttempts').textContent = '';
        document.getElementById('guessInput').value = '';
        document.getElementById('guessInput').disabled = false;
        document.getElementById('guessInput').focus();
    }

    function makeGuess(){
        const input = document.getElementById('guessInput');
        const val = parseInt(input.value);
        if(isNaN(val) || val < 1 || val > 100){
            alert('请输入 1-100 之间的数字');
            return;
        }
        guessAttempts++;
        let result = '';
        let resultClass = '';
        if(val === guessNumber){
            result = '🎉 正确！';
            resultClass = 'guess-result-correct';
            document.getElementById('guessInput').disabled = true;
            document.getElementById('guessAttempts').textContent = `恭喜！你用了 ${guessAttempts} 次猜中了！`;
        } else if(val < guessNumber){
            result = '⬆️ 太小了';
            resultClass = 'guess-result-low';
        } else {
            result = '⬇️ 太大了';
            resultClass = 'guess-result-high';
        }
        guessHistory.push({ num: val, result, class: resultClass });
        renderGuessHistory();
        input.value = '';
        input.focus();
    }

    function renderGuessHistory(){
        const el = document.getElementById('guessHistory');
        el.innerHTML = guessHistory.map((h, i) => `
            <div class="guess-item">
                <span class="guess-num">第 ${i+1} 次: ${h.num}</span>
                <span class="${h.class}">${h.result}</span>
            </div>
        `).join('');
    }

    // ==================== 扫雷 ====================
    let mineGrid = [];
    let mineRevealed = [];
    let mineFlagged = [];
    let mineGameOver = false;
    let mineFirstClick = true;
    let mineRows = 9, mineCols = 9, mineTotal = 10;
    let mineMode = false; // false=翻开, true=标记

    function newMineGame(){
        mineRows = 9; mineCols = 9; mineTotal = 10;
        mineGrid = Array(mineRows).fill(null).map(() => Array(mineCols).fill(0));
        mineRevealed = Array(mineRows).fill(null).map(() => Array(mineCols).fill(false));
        mineFlagged = Array(mineRows).fill(null).map(() => Array(mineCols).fill(false));
        mineGameOver = false;
        mineFirstClick = true;
        document.getElementById('mineCount').textContent = mineTotal;
        document.getElementById('flagCount').textContent = '0';
        document.getElementById('mineHint').textContent = '左键翻开，右键标记地雷';
        renderMine();
    }

    function placeMines(excludeR, excludeC){
        let placed = 0;
        while(placed < mineTotal){
            const r = Math.floor(Math.random() * mineRows);
            const c = Math.floor(Math.random() * mineCols);
            if(mineGrid[r][c] !== -1 && !(r === excludeR && c === excludeC)){
                mineGrid[r][c] = -1;
                placed++;
            }
        }
        // 计算数字
        for(let r = 0; r < mineRows; r++)
            for(let c = 0; c < mineCols; c++){
                if(mineGrid[r][c] === -1) continue;
                let count = 0;
                for(let dr = -1; dr <= 1; dr++)
                    for(let dc = -1; dc <= 1; dc++){
                        const nr = r + dr, nc = c + dc;
                        if(nr >= 0 && nr < mineRows && nc >= 0 && nc < mineCols && mineGrid[nr][nc] === -1) count++;
                    }
                mineGrid[r][c] = count;
            }
    }

    function renderMine(){
        const container = document.getElementById('mineGrid');
        container.innerHTML = '';
        const grid = document.createElement('div');
        grid.className = 'mine-grid';
        grid.style.gridTemplateColumns = `repeat(${mineCols}, 1fr)`;

        for(let r = 0; r < mineRows; r++){
            for(let c = 0; c < mineCols; c++){
                const cell = document.createElement('div');
                cell.className = 'mine-cell';
                cell.dataset.r = r;
                cell.dataset.c = c;

                if(mineRevealed[r][c]){
                    cell.classList.add('revealed');
                    if(mineGrid[r][c] === -1){
                        cell.textContent = '💣';
                        cell.classList.add('mine');
                    } else if(mineGrid[r][c] > 0){
                        cell.textContent = mineGrid[r][c];
                        cell.classList.add('mine-n' + mineGrid[r][c]);
                    }
                } else if(mineFlagged[r][c]){
                    cell.textContent = '🚩';
                    cell.classList.add('flagged');
                }

                cell.addEventListener('click', function(){
                    const rr = parseInt(this.dataset.r);
                    const cc = parseInt(this.dataset.c);
                    if(mineMode){
                        toggleFlag(rr, cc);
                    } else {
                        revealCell(rr, cc);
                    }
                });
                cell.addEventListener('contextmenu', function(e){
                    e.preventDefault();
                    const rr = parseInt(this.dataset.r);
                    const cc = parseInt(this.dataset.c);
                    toggleFlag(rr, cc);
                });

                grid.appendChild(cell);
            }
        }
        container.appendChild(grid);
    }

    function revealCell(r, c){
        if(mineGameOver || mineRevealed[r][c] || mineFlagged[r][c]) return;
        if(mineFirstClick){
            placeMines(r, c);
            mineFirstClick = false;
        }
        if(mineGrid[r][c] === -1){
            // 踩雷
            mineRevealed[r][c] = true;
            mineGameOver = true;
            // 显示所有雷
            for(let rr = 0; rr < mineRows; rr++)
                for(let cc = 0; cc < mineCols; cc++)
                    if(mineGrid[rr][cc] === -1) mineRevealed[rr][cc] = true;
            renderMine();
            document.getElementById('mineHint').textContent = '💥 踩到地雷了！点击"新游戏"重新开始';
            return;
        }
        // 翻开
        if(mineGrid[r][c] === 0){
            // 洪水填充
            const queue = [[r, c]];
            while(queue.length > 0){
                const [cr, cc] = queue.shift();
                if(cr < 0 || cr >= mineRows || cc < 0 || cc >= mineCols) continue;
                if(mineRevealed[cr][cc] || mineFlagged[cr][cc]) continue;
                mineRevealed[cr][cc] = true;
                if(mineGrid[cr][cc] === 0){
                    for(let dr = -1; dr <= 1; dr++)
                        for(let dc = -1; dc <= 1; dc++)
                            queue.push([cr+dr, cc+dc]);
                }
            }
        } else {
            mineRevealed[r][c] = true;
        }
        renderMine();
        checkWin();
    }

    function toggleFlag(r, c){
        if(mineGameOver || mineRevealed[r][c]) return;
        mineFlagged[r][c] = !mineFlagged[r][c];
        const count = mineFlagged.flat().filter(v => v).length;
        document.getElementById('flagCount').textContent = count;
        renderMine();
    }

    function checkWin(){
        let revealed = 0;
        for(let r = 0; r < mineRows; r++)
            for(let c = 0; c < mineCols; c++)
                if(mineRevealed[r][c]) revealed++;
        const total = mineRows * mineCols;
        if(revealed === total - mineTotal){
            document.getElementById('mineHint').textContent = '🎉 你赢了！';
            mineGameOver = true;
        }
    }

    function toggleMineMode(){
        mineMode = !mineMode;
        document.getElementById('mineModeBtn').textContent = mineMode ? '🔨 翻开模式' : '🚩 标记模式';
        document.getElementById('mineHint').textContent = mineMode ? '点击格子放置/取消标记' : '左键翻开，右键标记地雷';
    }

    // ========== 初始化 ==========
    init2048();
    newGuessGame();
    newMineGame();
</script>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>留言板</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        background-color: #0f172a;
        font-family: 'Noto Sans SC', sans-serif;
        min-height: 100vh;
        overflow-y: auto;
        overflow-x: hidden;
    }
    ::-webkit-scrollbar{
        width: 10px;
    }
    ::-webkit-scrollbar-track{
        background: #1e293b;
    }
    ::-webkit-scrollbar-thumb{
        background: linear-gradient(180deg, #87CEEB, #ADD8E6);
        border-radius: 5px;
    }

    /* 导航栏 */
    .navbar{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        box-shadow: 0 2px 20px rgba(76, 169, 250, 0.3);
        z-index: 9999;
        border-bottom: 1px solid rgba(135, 206, 235, 0.3);
    }
    .navbar-title{
        color: rgb(135, 206, 235);
        font-size: 20px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(135, 206, 235, 0.5);
        letter-spacing: 2px;
    }
    .navbar-right{
        display: flex;
        align-items: center;
        gap: 12px;
    }
    .nav-btn{
        padding: 8px 16px;
        font-size: 14px;
        font-weight: bold;
        font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        color: #0f172a;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 0 10px rgba(135, 206, 235, 0.6);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .nav-btn:hover{
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(135, 206, 235, 0.8);
    }

    /* 主内容区 */
    .container{
        max-width: 700px;
        margin: 80px auto 40px;
        padding: 0 16px;
    }

    /* 发送区域 */
    .send-box{
        background: linear-gradient(135deg, #1e293b, #0f172a);
        border: 1px solid rgba(135, 206, 235, 0.3);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 30px;
        box-shadow: 0 0 30px rgba(135, 206, 235, 0.1);
    }
    .send-box h2{
        color: rgb(135, 206, 235);
        text-shadow: 0 0 15px rgba(135, 206, 235, 0.5);
        margin-bottom: 16px;
        font-size: 20px;
    }
    .input-row{
        display: flex;
        gap: 12px;
        margin-bottom: 12px;
    }
    .input-nickname{
        flex: 0 0 140px;
        padding: 10px 14px;
        background: #0f172a;
        border: 1px solid rgba(135, 206, 235, 0.3);
        border-radius: 10px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        transition: border-color 0.3s;
    }
    .input-nickname:focus{
        border-color: rgba(135, 206, 235, 0.7);
        box-shadow: 0 0 10px rgba(135, 206, 235, 0.2);
    }
    .input-nickname::placeholder{
        color: #475569;
    }
    .char-count{
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        color: #475569;
        font-size: 13px;
    }
    .char-count .current{
        color: #94a3b8;
    }
    .char-count .warn{
        color: #f87171;
    }
    textarea{
        width: 100%;
        padding: 12px 14px;
        background: #0f172a;
        border: 1px solid rgba(135, 206, 235, 0.3);
        border-radius: 10px;
        color: #e2e8f0;
        font-size: 15px;
        font-family: inherit;
        outline: none;
        resize: vertical;
        min-height: 80px;
        max-height: 200px;
        transition: border-color 0.3s;
        line-height: 1.6;
    }
    textarea:focus{
        border-color: rgba(135, 206, 235, 0.7);
        box-shadow: 0 0 10px rgba(135, 206, 235, 0.2);
    }
    textarea::placeholder{
        color: #475569;
    }
    .send-btn{
        margin-top: 14px;
        padding: 10px 30px;
        font-size: 15px;
        font-weight: bold;
        font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        color: #0f172a;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        box-shadow: 0 0 15px rgba(135, 206, 235, 0.5);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .send-btn:hover{
        transform: scale(1.05);
        box-shadow: 0 0 25px rgba(135, 206, 235, 0.7);
    }
    .send-btn:active{
        transform: scale(0.95);
    }
    .send-btn:disabled{
        opacity: 0.5;
        cursor: not-allowed;
        transform: none;
    }

    /* 留言列表 */
    .messages-header{
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 16px;
    }
    .messages-header h2{
        color: rgb(135, 206, 235);
        text-shadow: 0 0 15px rgba(135, 206, 235, 0.5);
        font-size: 20px;
    }
    .messages-count{
        color: #64748b;
        font-size: 13px;
    }
    .message-list{
        display: flex;
        flex-direction: column;
        gap: 14px;
    }
    .message-card{
        background: linear-gradient(135deg, #1e293b, #0f172a);
        border: 1px solid rgba(135, 206, 235, 0.2);
        border-radius: 14px;
        padding: 18px 20px;
        transition: border-color 0.3s, box-shadow 0.3s;
        animation: fadeInUp 0.4s ease;
    }
    .message-card:hover{
        border-color: rgba(135, 206, 235, 0.4);
        box-shadow: 0 0 20px rgba(135, 206, 235, 0.1);
    }
    .message-top{
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 10px;
    }
    .message-nickname{
        font-weight: bold;
        font-size: 15px;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }
    .message-time{
        color: #475569;
        font-size: 12px;
    }
    .message-content{
        color: #cbd5e1;
        font-size: 14px;
        line-height: 1.7;
        word-break: break-word;
        white-space: pre-wrap;
    }

    /* 空状态 */
    .empty-state{
        text-align: center;
        padding: 60px 20px;
        color: #475569;
    }
    .empty-state .icon{
        font-size: 48px;
        margin-bottom: 16px;
    }
    .empty-state p{
        font-size: 15px;
    }

    /* 加载动画 */
    .loading{
        text-align: center;
        padding: 40px;
        color: #64748b;
    }
    .loading .dots::after{
        content: '';
        animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots{
        0%{ content: ''; }
        25%{ content: '.'; }
        50%{ content: '..'; }
        75%{ content: '...'; }
    }

    /* 提示消息 */
    .toast{
        position: fixed;
        top: 80px;
        left: 50%;
        transform: translateX(-50%) translateY(-20px);
        padding: 12px 24px;
        border-radius: 10px;
        font-size: 14px;
        font-weight: bold;
        z-index: 99999;
        opacity: 0;
        transition: all 0.3s ease;
        pointer-events: none;
    }
    .toast.show{
        opacity: 1;
        transform: translateX(-50%) translateY(0);
    }
    .toast.success{
        background: linear-gradient(135deg, #065f46, #047857);
        color: #6ee7b7;
        border: 1px solid #6ee7b7;
        box-shadow: 0 0 20px rgba(110, 231, 183, 0.3);
    }
    .toast.error{
        background: linear-gradient(135deg, #7f1d1d, #991b1b);
        color: #fca5a5;
        border: 1px solid #fca5a5;
        box-shadow: 0 0 20px rgba(252, 165, 165, 0.3);
    }

    @keyframes fadeInUp{
        from{
            opacity: 0;
            transform: translateY(15px);
        }
        to{
            opacity: 1;
            transform: translateY(0);
        }
    }

    .message-card:hover .msg-delete{
        opacity: 1;
    }
    .msg-delete{
        background: rgba(239, 68, 68, 0.15);
        border: 1px solid rgba(239, 68, 68, 0.3);
        color: #f87171;
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 12px;
        cursor: pointer;
        transition: all 0.2s;
        opacity: 0;
        margin-left: 8px;
        font-family: inherit;
    }
    .msg-delete:hover{
        background: rgba(239, 68, 68, 0.3);
        border-color: #f87171;
    }

    /* 登录按钮 */
    .admin-btn{
        padding: 8px 16px;
        font-size: 13px;
        font-weight: bold;
        font-family: inherit;
        background: transparent;
        color: var(--accent-cyan, #87CEEB);
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 20px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .admin-btn:hover{
        border-color: rgba(135,206,235,0.7);
        box-shadow: 0 0 15px rgba(135,206,235,0.3);
    }
    .admin-btn.logged-in{
        background: rgba(34, 197, 94, 0.15);
        border-color: rgba(34, 197, 94, 0.5);
        color: #4ade80;
    }

    /* 登录弹窗 */
    .modal-overlay{
        position: fixed;
        top: 0; left: 0; width: 100%; height: 100%;
        background: rgba(0,0,0,0.7);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s;
    }
    .modal-overlay.active{
        opacity: 1;
        pointer-events: auto;
    }
    .modal-box{
        background: linear-gradient(135deg, #1e293b, #0f172a);
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 16px;
        padding: 30px;
        width: 90%;
        max-width: 380px;
        box-shadow: 0 0 40px rgba(0,0,0,0.5);
    }
    .modal-box h3{
        color: #87CEEB;
        margin-bottom: 10px;
        font-size: 18px;
        text-align: center;
    }
    .modal-box .modal-desc{
        color: #64748b;
        font-size: 13px;
        text-align: center;
        margin-bottom: 18px;
    }
    .modal-box input{
        width: 100%;
        padding: 10px 14px;
        background: #0f172a;
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 10px;
        color: #e2e8f0;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        margin-bottom: 14px;
        transition: border-color 0.3s;
    }
    .modal-box input:focus{
        border-color: rgba(135,206,235,0.7);
    }
    .modal-box .btn-row{
        display: flex;
        gap: 10px;
    }
    .modal-box .btn-row button{
        flex: 1;
        padding: 10px;
        font-size: 14px;
        font-weight: bold;
        font-family: inherit;
        border-radius: 10px;
        cursor: pointer;
        border: none;
        transition: all 0.3s;
    }
    .btn-login{
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        color: #0f172a;
    }
    .btn-login:hover{ transform: scale(1.02); }
    .btn-login:disabled{ opacity: 0.5; cursor: not-allowed; transform: none; }
    .btn-cancel{
        background: rgba(71,85,105,0.5);
        color: #94a3b8;
    }
    .btn-cancel:hover{ background: rgba(71,85,105,0.7); }
    .btn-changepw{
        margin-top: 10px;
        width: 100%;
        padding: 8px;
        font-size: 12px;
        font-family: inherit;
        background: transparent;
        border: 1px dashed rgba(135,206,235,0.3);
        color: #64748b;
        border-radius: 8px;
        cursor: pointer;
        transition: all 0.3s;
    }
    .btn-changepw:hover{ border-color: rgba(135,206,235,0.7); color: #94a3b8; }

    @media (max-width: 768px){
        .input-row{
            flex-direction: column;
            gap: 8px;
        }
        .input-nickname{
            flex: 1;
        }
        .send-box{
            padding: 18px;
        }
        .message-card{
            padding: 14px 16px;
        }
    }
</style>

<div class="navbar">
    <div class="navbar-title">💬 留言板</div>
    <div class="navbar-right">
        <button class="admin-btn" id="adminBtn" onclick="openLoginModal()" title="管理留言">🔑 管理</button>
        <a href="/" class="nav-btn">🏠 主页</a>
    </div>
</div>

<div class="container">
    <!-- 发送区域 -->
    <div class="send-box">
        <h2>✍️ 写下你的留言</h2>
        <div class="input-row">
            <input type="text" class="input-nickname" id="nickname" placeholder="昵称（可选）" maxlength="20">
            <div class="char-count"><span id="charCount" class="current">0</span>/500</div>
        </div>
        <textarea id="messageContent" placeholder="说点什么吧..." maxlength="500"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送留言</button>
    </div>

    <!-- 留言列表 -->
    <div class="messages-header">
        <h2>📋 所有留言</h2>
        <div class="messages-count" id="messagesCount"></div>
    </div>
    <div id="messageList" class="message-list">
        <div class="loading">加载中<span class="dots"></span></div>
    </div>
</div>

<!-- 提示消息 -->
<div class="toast" id="toast"></div>

<!-- 登录弹窗 -->
<div class="modal-overlay" id="loginModal" onclick="if(event.target===this)closeLoginModal()">
    <div class="modal-box">
        <h3>🔐 管理员登录</h3>
        <div class="modal-desc" id="modalDesc">输入密码以管理留言</div>
        <input type="password" id="loginPassword" placeholder="请输入密码" onkeydown="if(event.key==='Enter')doLogin()">
        <div class="btn-row">
            <button class="btn-cancel" onclick="closeLoginModal()">取消</button>
            <button class="btn-login" id="loginBtn" onclick="doLogin()">登录</button>
        </div>
        <button class="btn-changepw" id="changePwBtn" style="display:none" onclick="showChangePw()">🔒 修改密码</button>
        <button class="btn-changepw" id="logoutBtn2" style="display:none;color:#f87171;border-color:rgba(239,68,68,0.3)" onclick="doLogout();closeLoginModal()">🚪 退出登录</button>
        <input type="password" id="newPassword" placeholder="输入新密码（至少4位）" style="display:none; margin-top:10px" onkeydown="if(event.key==='Enter')doChangePw()">
        <div class="btn-row" id="changePwRow" style="display:none">
            <button class="btn-cancel" onclick="hideChangePw()">取消</button>
            <button class="btn-login" onclick="doChangePw()">确认修改</button>
        </div>
    </div>
</div>

<script>
    const contentEl = document.getElementById('messageContent');
    const charCountEl = document.getElementById('charCount');
    const sendBtn = document.getElementById('sendBtn');

    // 字数统计
    contentEl.addEventListener('input', function(){
        const len = this.value.length;
        charCountEl.textContent = len;
        if(len > 450){
            charCountEl.className = 'warn';
        } else {
            charCountEl.className = 'current';
        }
    });

    // Ctrl+Enter 发送
    contentEl.addEventListener('keydown', function(e){
        if(e.ctrlKey && e.key === 'Enter'){
            sendMessage();
        }
    });

    // 显示提示
    function showToast(msg, type){
        const toast = document.getElementById('toast');
        toast.textContent = msg;
        toast.className = 'toast ' + type;
        setTimeout(() => toast.classList.add('show'), 10);
        setTimeout(() => toast.classList.remove('show'), 2500);
    }

    // 发送留言
    async function sendMessage(){
        const content = contentEl.value.trim();
        if(!content){
            showToast('请输入留言内容', 'error');
            return;
        }
        const nickname = document.getElementById('nickname').value.trim();

        sendBtn.disabled = true;
        sendBtn.textContent = '发送中...';

        try{
            const res = await fetch('/api/messages', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ nickname, content })
            });
            const data = await res.json();

            if(data.success){
                showToast('留言发送成功！', 'success');
                contentEl.value = '';
                charCountEl.textContent = '0';
                charCountEl.className = 'current';
                loadMessages();
            } else {
                showToast(data.error || '发送失败', 'error');
            }
        } catch(e){
            showToast('网络错误，请重试', 'error');
        }

        sendBtn.disabled = false;
        sendBtn.textContent = '发送留言';
    }

    // 格式化时间
    function formatTime(timestamp){
        const now = Date.now();
        const diff = now - timestamp;
        const seconds = Math.floor(diff / 1000);
        const minutes = Math.floor(seconds / 60);
        const hours = Math.floor(minutes / 60);
        const days = Math.floor(hours / 24);

        if(seconds < 60) return '刚刚';
        if(minutes < 60) return minutes + '分钟前';
        if(hours < 24) return hours + '小时前';
        if(days < 7) return days + '天前';

        const d = new Date(timestamp);
        const month = String(d.getMonth() + 1).padStart(2, '0');
        const day = String(d.getDate()).padStart(2, '0');
        const h = String(d.getHours()).padStart(2, '0');
        const m = String(d.getMinutes()).padStart(2, '0');
        return `${month}-${day} ${h}:${m}`;
    }

    // ===== 登录管理 =====
    let adminToken = localStorage.getItem('adminToken') || '';
    let isLoggedIn = false;

    async function checkLogin(){
        if(!adminToken) { isLoggedIn = false; updateAdminUI(); return; }
        try{
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'verify', token: adminToken })
            });
            const data = await res.json();
            isLoggedIn = data.valid;
            if(!isLoggedIn) { adminToken = ''; localStorage.removeItem('adminToken'); }
        } catch(e){ isLoggedIn = false; }
        updateAdminUI();
    }

    function updateAdminUI(){
        const btn = document.getElementById('adminBtn');
        if(isLoggedIn){
            btn.textContent = '✅ 管理';
            btn.className = 'admin-btn logged-in';
            btn.onclick = function(){
                // 已登录：打开管理面板（修改密码 + 退出）
                document.getElementById('loginModal').classList.add('active');
                document.getElementById('modalDesc').textContent = '管理留言';
                document.getElementById('loginPassword').style.display = 'none';
                document.getElementById('loginBtn').style.display = 'none';
                document.querySelector('#loginModal .btn-cancel').textContent = '关闭';
                document.getElementById('changePwBtn').style.display = '';
                document.getElementById('logoutBtn2').style.display = '';
                hideChangePw();
            };
        } else {
            btn.textContent = '🔑 管理';
            btn.className = 'admin-btn';
            btn.onclick = openLoginModal;
        }
        loadMessages();
    }

    function openLoginModal(){
        document.getElementById('loginModal').classList.add('active');
        document.getElementById('loginPassword').style.display = '';
        document.getElementById('loginPassword').value = '';
        document.getElementById('loginBtn').style.display = '';
        document.querySelector('#loginModal .btn-cancel').textContent = '取消';
        document.getElementById('modalDesc').textContent = '输入密码以管理留言';
        document.getElementById('loginBtn').disabled = false;
        document.getElementById('loginBtn').textContent = '登录';
        document.getElementById('changePwBtn').style.display = 'none';
        document.getElementById('logoutBtn2').style.display = 'none';
        hideChangePw();
        setTimeout(() => document.getElementById('loginPassword').focus(), 200);
    }

    function closeLoginModal(){
        document.getElementById('loginModal').classList.remove('active');
        document.getElementById('loginPassword').style.display = '';
        document.getElementById('loginBtn').style.display = '';
        document.querySelector('#loginModal .btn-cancel').textContent = '取消';
        document.getElementById('changePwBtn').style.display = 'none';
        document.getElementById('logoutBtn2').style.display = 'none';
        hideChangePw();
    }

    async function doLogin(){
        const pw = document.getElementById('loginPassword').value;
        if(!pw){ showToast('请输入密码', 'error'); return; }
        const btn = document.getElementById('loginBtn');
        btn.disabled = true;
        btn.textContent = '验证中...';
        try{
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: pw })
            });
            const data = await res.json();
            if(data.success){
                adminToken = data.token;
                localStorage.setItem('adminToken', adminToken);
                isLoggedIn = true;
                showToast('登录成功！可管理留言', 'success');
                closeLoginModal();
                updateAdminUI();
            } else {
                showToast(data.error || '密码错误', 'error');
                document.getElementById('loginPassword').value = '';
                document.getElementById('loginPassword').focus();
            }
        } catch(e){ showToast('网络错误', 'error'); }
        btn.disabled = false;
        btn.textContent = '登录';
    }

    async function doLogout(){
        try{
            await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'logout', token: adminToken })
            });
        } catch(e){}
        adminToken = '';
        localStorage.removeItem('adminToken');
        isLoggedIn = false;
        showToast('已退出管理', 'success');
        updateAdminUI();
    }

    function showChangePw(){
        document.getElementById('newPassword').style.display = '';
        document.getElementById('changePwRow').style.display = 'flex';
        document.getElementById('changePwBtn').style.display = 'none';
    }
    function hideChangePw(){
        document.getElementById('newPassword').style.display = 'none';
        document.getElementById('changePwRow').style.display = 'none';
        if(isLoggedIn) document.getElementById('changePwBtn').style.display = '';
    }
    async function doChangePw(){
        const pw = document.getElementById('newPassword').value.trim();
        if(pw.length < 4){ showToast('密码至少4位', 'error'); return; }
        try{
            const res = await fetch('/api/auth', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + adminToken },
                body: JSON.stringify({ action: 'change_password', newPassword: pw })
            });
            const data = await res.json();
            if(data.success){
                showToast('密码修改成功！', 'success');
                hideChangePw();
                document.getElementById('newPassword').value = '';
            } else { showToast(data.error || '修改失败', 'error'); }
        } catch(e){ showToast('网络错误', 'error'); }
    }

    // 删除留言
    async function deleteMessage(id){
        if(!confirm('确定删除这条留言？')) return;
        try{
            const res = await fetch('/api/messages?id=' + encodeURIComponent(id), {
                method: 'DELETE',
                headers: { 'Authorization': 'Bearer ' + adminToken }
            });
            const data = await res.json();
            if(data.success){
                showToast('已删除', 'success');
                loadMessages();
            } else {
                showToast(data.error || '删除失败', 'error');
                if(data.error === '请先登录'){ doLogout(); }
            }
        } catch(e){ showToast('网络错误', 'error'); }
    }

    // 加载留言
    async function loadMessages(){
        const listEl = document.getElementById('messageList');
        const countEl = document.getElementById('messagesCount');

        try{
            const res = await fetch('/api/messages', { cache: 'no-store' });
            const data = await res.json();

            if(data.success && data.messages.length > 0){
                countEl.textContent = `共 ${data.messages.length} 条`;
                listEl.innerHTML = data.messages.map(msg => `
                    <div class="message-card">
                        <div class="message-top">
                            <span class="message-nickname">${escapeHtml(msg.nickname)}</span>
                            <span style="display:flex;align-items:center;gap:10px">
                                ${isLoggedIn ? '<button class="msg-delete" onclick="deleteMessage(\'' + msg.id + '\')" title="删除">✕</button>' : ''}
                                <span class="message-time">${formatTime(msg.timestamp)}</span>
                            </span>
                        </div>
                        <div class="message-content">${escapeHtml(msg.content)}</div>
                    </div>
                `).join('');
            } else {
                countEl.textContent = '';
                listEl.innerHTML = `
                    <div class="empty-state">
                        <div class="icon">💭</div>
                        <p>还没有留言，快来写下第一条吧！</p>
                    </div>
                `;
            }
        } catch(e){
            listEl.innerHTML = `
                <div class="empty-state">
                    <div class="icon">⚠️</div>
                    <p>加载失败，请刷新重试</p>
                </div>
            `;
        }
    }

    // HTML转义防XSS
    function escapeHtml(str){
        const div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }

    // 初始加载
    checkLogin();

    // 每30秒自动刷新留言
    setInterval(loadMessages, 30000);

    // 访问统计追踪
    (function trackVisit(){
        try {
            fetch('/api/stats', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    page: '/messages/',
                    pageName: '留言'
                })
            }).catch(()=>{});
        } catch(e) {}
    })();
</script>
</html>

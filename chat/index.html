<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <title>AI 聊天 - AP 工作室</title>
</head>
<style>
    *{ margin: 0; padding: 0; box-sizing: border-box; }
    body{
        background-color: #0f172a;
        font-family: 'Noto Sans SC', sans-serif;
        min-height: 100vh;
        overflow: hidden;
    }
    ::-webkit-scrollbar{ width: 6px; }
    ::-webkit-scrollbar-track{ background: #1e293b; }
    ::-webkit-scrollbar-thumb{ background: linear-gradient(180deg, #87CEEB, #ADD8E6); border-radius: 3px; }

    .navbar{
        position: fixed; top: 0; left: 0; width: 100%; height: 60px;
        background: linear-gradient(135deg, rgba(15,23,42,0.95), rgba(30,41,59,0.95));
        backdrop-filter: blur(10px); display: flex; align-items: center;
        justify-content: space-between; padding: 0 20px;
        box-shadow: 0 2px 20px rgba(76,169,250,0.3); z-index: 9999;
        border-bottom: 1px solid rgba(135,206,235,0.3);
    }
    .navbar-title{
        color: rgb(135,206,235); font-size: 20px; font-weight: bold;
        text-shadow: 0 0 10px rgba(135,206,235,0.5); letter-spacing: 2px;
    }
    .navbar-right{ display: flex; align-items: center; gap: 12px; }
    .nav-btn{
        padding: 8px 16px; font-size: 14px; font-weight: bold; font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6); color: #0f172a;
        border: none; border-radius: 20px; cursor: pointer; text-decoration: none;
        box-shadow: 0 0 10px rgba(135,206,235,0.6);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .nav-btn:hover{ transform: scale(1.05); box-shadow: 0 0 20px rgba(135,206,235,0.8); }

    /* 聊天容器 */
    .chat-container{
        max-width: 800px;
        margin: 80px auto 0;
        height: calc(100vh - 80px);
        display: flex;
        flex-direction: column;
        padding: 0 20px;
    }
    .chat-header{
        text-align: center; padding: 15px 0;
    }
    .chat-header h1{
        color: rgb(76,169,250); text-shadow: 0 0 20px rgb(76,169,250);
        font-size: 28px; margin-bottom: 5px;
    }
    .chat-header p{
        color: #64748b; font-size: 14px;
    }

    /* 消息列表 */
    .chat-messages{
        flex: 1;
        overflow-y: auto;
        padding: 20px 0;
        display: flex;
        flex-direction: column;
        gap: 15px;
    }
    .message{
        display: flex;
        gap: 12px;
        max-width: 85%;
        animation: msgIn 0.3s ease;
    }
    .message.user{
        align-self: flex-end;
        flex-direction: row-reverse;
    }
    .message.assistant{
        align-self: flex-start;
    }

    @keyframes msgIn{
        from{ opacity: 0; transform: translateY(10px); }
        to{ opacity: 1; transform: translateY(0); }
    }

    .message-avatar{
        width: 36px; height: 36px; border-radius: 50%;
        display: flex; align-items: center; justify-content: center;
        font-size: 18px; flex-shrink: 0;
    }
    .message.user .message-avatar{
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
    }
    .message.assistant .message-avatar{
        background: linear-gradient(135deg, #a855f7, #7c3aed);
    }

    .message-bubble{
        padding: 12px 16px;
        border-radius: 18px;
        font-size: 15px;
        line-height: 1.7;
        position: relative;
    }
    .message.user .message-bubble{
        background: linear-gradient(135deg, #1e40af, #1e3a5f);
        color: #e2e8f0;
        border-bottom-right-radius: 4px;
    }
    .message.assistant .message-bubble{
        background: rgba(30,41,59,0.9);
        color: #cbd5e1;
        border: 1px solid rgba(135,206,235,0.2);
        border-bottom-left-radius: 4px;
    }
    .message-bubble p{
        margin: 5px 0;
    }
    .message-bubble code{
        background: rgba(0,0,0,0.3);
        padding: 2px 6px;
        border-radius: 4px;
        font-size: 13px;
        font-family: 'Courier New', monospace;
        color: #fbbf24;
    }
    .message-bubble pre{
        background: rgba(0,0,0,0.4);
        padding: 12px;
        border-radius: 8px;
        overflow-x: auto;
        margin: 8px 0;
    }
    .message-bubble pre code{
        background: none;
        padding: 0;
        color: #4ade80;
    }

    .message-time{
        font-size: 11px;
        color: #475569;
        margin-top: 5px;
        text-align: right;
    }

    /* 输入区域 */
    .chat-input-area{
        padding: 15px 0 20px;
        border-top: 1px solid rgba(135,206,235,0.2);
    }
    .chat-input-row{
        display: flex;
        gap: 10px;
        align-items: flex-end;
    }
    .chat-input{
        flex: 1;
        padding: 12px 18px;
        font-size: 15px;
        font-family: inherit;
        background: rgba(30,41,59,0.8);
        border: 2px solid rgba(135,206,235,0.3);
        border-radius: 25px;
        color: #e2e8f0;
        outline: none;
        resize: none;
        max-height: 120px;
        min-height: 44px;
        line-height: 1.5;
        transition: border-color 0.3s;
    }
    .chat-input:focus{
        border-color: rgba(76,169,250,0.6);
        box-shadow: 0 0 15px rgba(76,169,250,0.2);
    }
    .chat-input::placeholder{ color: #475569; }

    .chat-send-btn{
        width: 44px; height: 44px;
        border-radius: 50%;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        border: none;
        color: #0f172a;
        font-size: 18px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
        flex-shrink: 0;
        box-shadow: 0 0 15px rgba(135,206,235,0.4);
    }
    .chat-send-btn:hover{ transform: scale(1.1); box-shadow: 0 0 25px rgba(135,206,235,0.6); }
    .chat-send-btn:active{ transform: scale(0.9); }
    .chat-send-btn:disabled{ opacity: 0.5; cursor: not-allowed; transform: none; }

    /* 打字指示器 */
    .typing-indicator{
        display: none;
        align-self: flex-start;
        padding: 12px 20px;
        background: rgba(30,41,59,0.9);
        border: 1px solid rgba(135,206,235,0.2);
        border-radius: 18px;
        border-bottom-left-radius: 4px;
        gap: 5px;
    }
    .typing-indicator.show{ display: flex; }
    .typing-dot{
        width: 8px; height: 8px;
        border-radius: 50%;
        background: #87CEEB;
        animation: typingBounce 1.4s ease-in-out infinite;
    }
    .typing-dot:nth-child(2){ animation-delay: 0.2s; }
    .typing-dot:nth-child(3){ animation-delay: 0.4s; }
    @keyframes typingBounce{
        0%, 60%, 100%{ transform: translateY(0); opacity: 0.4; }
        30%{ transform: translateY(-8px); opacity: 1; }
    }

    /* 欢迎消息中的快速提问按钮 */
    .suggestions{
        display: flex; flex-wrap: wrap; gap: 8px; margin-top: 10px;
    }
    .suggestion-btn{
        padding: 6px 14px; font-size: 13px; font-family: inherit;
        background: rgba(135,206,235,0.1);
        border: 1px solid rgba(135,206,235,0.3);
        border-radius: 15px;
        color: #87CEEB;
        cursor: pointer;
        transition: all 0.2s ease;
    }
    .suggestion-btn:hover{
        background: rgba(135,206,235,0.2);
        border-color: rgba(135,206,235,0.6);
    }

    /* 清除按钮 */
    .clear-btn{
        background: none;
        border: none;
        color: #475569;
        font-size: 13px;
        cursor: pointer;
        padding: 5px 10px;
        border-radius: 10px;
        transition: all 0.3s ease;
    }
    .clear-btn:hover{ color: #ef4444; background: rgba(239,68,68,0.1); }

    .chat-header-top{
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
    }

    @media (max-width: 600px){
        .chat-container{ padding: 0 12px; }
        .message{ max-width: 90%; }
        .chat-header h1{ font-size: 22px; }
    }
</style>
<body>
    <div class="navbar">
        <div class="navbar-title">🤖 AI 聊天</div>
        <div class="navbar-right">
            <a href="/" class="nav-btn">🏠 主页</a>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="chat-header-top">
                <h1>🤖 AI 助手</h1>
                <button class="clear-btn" onclick="clearChat()">🗑️ 清除对话</button>
            </div>
            <p>基于 Llama 3.1 8B 模型，随时为你解答问题</p>
        </div>

        <div class="chat-messages" id="chatMessages"></div>

        <!-- 打字指示器 -->
        <div class="typing-indicator" id="typingIndicator">
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
            <div class="typing-dot"></div>
        </div>

        <div class="chat-input-area">
            <div class="chat-input-row">
                <textarea class="chat-input" id="chatInput" rows="1" placeholder="输入你的问题..." onkeydown="handleInputKey(event)" oninput="autoResize(this)"></textarea>
                <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    const chatInput = document.getElementById('chatInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    let messageHistory = [];

    // ========== 加载历史 ==========
    try {
        const saved = localStorage.getItem('chatHistory');
        if(saved){
            messageHistory = JSON.parse(saved);
            messageHistory.forEach(msg => renderMessage(msg, false));
        }
    } catch(e) {}

    // ========== 如果没有消息，显示欢迎 ==========
    if(messageHistory.length === 0){
        addWelcomeMessage();
    }

    function addWelcomeMessage(){
        const welcomeMsg = {
            role: 'assistant',
            content: '你好！我是 AI 助手，基于 Llama 3.1 模型。我可以帮你解答问题、编写代码、翻译、写作等等。有什么我可以帮你的吗？',
            time: Date.now()
        };
        // 不保存欢迎消息到历史
        renderMessage(welcomeMsg, false);
    }

    // ========== 渲染消息 ==========
    function renderMessage(msg, save = true){
        const div = document.createElement('div');
        div.className = 'message ' + msg.role;

        const avatar = document.createElement('div');
        avatar.className = 'message-avatar';
        avatar.textContent = msg.role === 'user' ? '👤' : '🤖';

        const bubble = document.createElement('div');
        bubble.className = 'message-bubble';

        // 渲染 Markdown 风格的文本
        const formatted = formatContent(msg.content);
        bubble.innerHTML = formatted;

        // 时间
        if(msg.time){
            const timeDiv = document.createElement('div');
            timeDiv.className = 'message-time';
            const d = new Date(msg.time);
            timeDiv.textContent = `${String(d.getHours()).padStart(2, '0')}:${String(d.getMinutes()).padStart(2, '0')}`;
            bubble.appendChild(timeDiv);
        }

        div.appendChild(avatar);
        div.appendChild(bubble);
        chatMessages.appendChild(div);

        if(save){
            messageHistory.push(msg);
            localStorage.setItem('chatHistory', JSON.stringify(messageHistory));
        }

        scrollToBottom();
    }

    // ========== 格式化内容 ==========
    function formatContent(text){
        // 转义 HTML
        let html = text.replace(/&/g, '&').replace(/</g, '<').replace(/>/g, '>');
        // 代码块 (```)
        html = html.replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>');
        // 行内代码 (`)
        html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
        // 粗体 (**)
        html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
        // 换行
        html = html.replace(/\n/g, '<br>');
        return html;
    }

    // ========== 发送消息 ==========
    async function sendMessage(){
        const text = chatInput.value.trim();
        if(!text) return;

        chatInput.value = '';
        autoResize(chatInput);
        sendBtn.disabled = true;

        // 添加用户消息
        renderMessage({ role: 'user', content: text, time: Date.now() });

        // 显示打字指示器
        typingIndicator.classList.add('show');
        scrollToBottom();

        try {
            // 准备消息历史（取最近 20 条）
            const recentMessages = messageHistory.slice(-20).map(m => ({
                role: m.role,
                content: m.content
            }));

            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    messages: recentMessages,
                    stream: false
                })
            });

            if(!res.ok){
                const errData = await res.json().catch(() => ({}));
                throw new Error(errData.error || `HTTP ${res.status}`);
            }

            const data = await res.json();
            const reply = data.reply || data.choices?.[0]?.message?.content || '抱歉，我没有理解你的问题。';

            renderMessage({ role: 'assistant', content: reply, time: Date.now() });

        } catch(e){
            renderMessage({
                role: 'assistant',
                content: `⚠️ 连接失败：${e.message}\n\n请检查网络连接，或者稍后重试。`,
                time: Date.now()
            });
        }

        typingIndicator.classList.remove('show');
        sendBtn.disabled = false;
        chatInput.focus();
    }

    // ========== 清除对话 ==========
    function clearChat(){
        if(messageHistory.length === 0) return;
        if(!confirm('确定要清除所有对话记录吗？')) return;
        messageHistory = [];
        localStorage.removeItem('chatHistory');
        chatMessages.innerHTML = '';
        addWelcomeMessage();
    }

    // ========== 工具函数 ==========
    function handleInputKey(e){
        if(e.key === 'Enter' && !e.shiftKey){
            e.preventDefault();
            sendMessage();
        }
        if(e.key === 'Enter' && e.shiftKey){
            // 允许 Shift+Enter 换行
        }
    }

    function autoResize(textarea){
        textarea.style.height = 'auto';
        textarea.style.height = Math.min(textarea.scrollHeight, 120) + 'px';
    }

    function scrollToBottom(){
        setTimeout(() => {
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }, 50);
    }

    // Ctrl+Enter 发送
    chatInput.addEventListener('keydown', function(e){
        if(e.ctrlKey && e.key === 'Enter'){
            e.preventDefault();
            sendMessage();
        }
    });

    // 访问统计追踪
    fetch('/api/stats', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ page: '/chat/', pageName: 'AI 聊天' })
    }).catch(()=>{});
</script>
</body>
</html>

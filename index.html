<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Audiowide&family=Noto+Sans+SC:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }
    body{
        background-color: #0f172a; 
        text-align: center;
        font-family: 'Noto Sans SC', 'Orbitron', 'Audiowide', sans-serif;
        overflow-y: auto;
        overflow-x: hidden;
        transition: background-color 0.5s ease, color 0.5s ease;
    }

    /* ===== 主题变量 ===== */
    :root{
        --bg-primary: #0f172a;
        --bg-secondary: #1e293b;
        --bg-card: rgba(30, 41, 59, 0.9);
        --text-primary: #fff;
        --text-secondary: #cbd5e1;
        --text-muted: #94a3b8;
        --text-dim: #64748b;
        --accent-blue: rgb(76, 169, 250);
        --accent-cyan: rgb(135, 206, 235);
        --accent-gold: rgb(224, 207, 16);
        --border-color: rgba(135, 206, 235, 0.3);
        --navbar-bg: linear-gradient(135deg, rgba(15, 23, 42, 0.95), rgba(30, 41, 59, 0.95));
        --card-bg: linear-gradient(135deg, #1e293b, #0f172a);
        --glow-blue: 0 0 20px rgb(76, 169, 250);
        --glow-cyan: 0 0 20px rgba(135, 206, 235, 0.6);
    }
    body.light-theme{
        --bg-primary: #f0f4f8;
        --bg-secondary: #e2e8f0;
        --bg-card: rgba(255, 255, 255, 0.9);
        --text-primary: #1e293b;
        --text-secondary: #334155;
        --text-muted: #475569;
        --text-dim: #64748b;
        --accent-blue: #2563eb;
        --accent-cyan: #0891b2;
        --accent-gold: #d97706;
        --border-color: rgba(8, 145, 178, 0.3);
        --navbar-bg: linear-gradient(135deg, rgba(240, 244, 248, 0.95), rgba(226, 232, 240, 0.95));
        --card-bg: linear-gradient(135deg, #ffffff, #f8fafc);
        --glow-blue: 0 0 20px rgba(37, 99, 235, 0.3);
        --glow-cyan: 0 0 20px rgba(8, 145, 178, 0.3);
    }
    body.cyber-theme{
        --bg-primary: #0a0015;
        --bg-secondary: #1a0030;
        --bg-card: rgba(20, 0, 40, 0.9);
        --text-primary: #ff00ff;
        --text-secondary: #ff88ff;
        --text-muted: #cc55cc;
        --text-dim: #993399;
        --accent-blue: #ff00ff;
        --accent-cyan: #ff44ff;
        --accent-gold: #ffff00;
        --border-color: rgba(255, 0, 255, 0.3);
        --navbar-bg: linear-gradient(135deg, rgba(10, 0, 21, 0.95), rgba(26, 0, 48, 0.95));
        --card-bg: linear-gradient(135deg, #1a0030, #0a0015);
        --glow-blue: 0 0 20px #ff00ff;
        --glow-cyan: 0 0 20px rgba(255, 0, 255, 0.6);
    }

    /* 自定义滚动条 */
    ::-webkit-scrollbar{
        width: 10px;
    }
    ::-webkit-scrollbar-track{
        background: var(--bg-secondary);
    }
    ::-webkit-scrollbar-thumb{
        background: linear-gradient(180deg, var(--accent-cyan), #ADD8E6);
        border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover{
        background: linear-gradient(180deg, #ADD8E6, var(--accent-cyan));
    }

    h1{
        color: var(--accent-blue);
        text-shadow: 0 0 20px var(--accent-blue);
        transition: color 0.5s, text-shadow 0.5s;
    }
    h2{
        color: var(--accent-gold);
        text-shadow: 0 0 20px var(--accent-gold);
        transition: color 0.5s, text-shadow 0.5s;
    }

    /* ===== 导航栏 ===== */
    .navbar{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 60px;
        background: var(--navbar-bg);
        backdrop-filter: blur(10px);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 20px;
        box-shadow: 0 2px 20px rgba(76, 169, 250, 0.3);
        z-index: 9999;
        border-bottom: 1px solid var(--border-color);
        box-sizing: border-box;
        overflow: visible;
        transition: background 0.5s;
    }
    .navbar-title{
        color: var(--accent-cyan);
        font-size: 20px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(135, 206, 235, 0.5);
        letter-spacing: 2px;
        transition: color 0.5s;
        flex-shrink: 0;
    }
    .navbar-time{
        color: var(--text-primary);
        font-size: 14px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.8), 0 0 20px rgba(76, 169, 250, 0.6);
        letter-spacing: 2px;
        font-family: 'Courier New', monospace;
        white-space: nowrap;
    }
    .navbar-online{
        color: #4ade80;
        font-size: 13px;
        font-weight: bold;
        text-shadow: 0 0 10px rgba(74, 222, 128, 0.6);
        letter-spacing: 1px;
        white-space: nowrap;
        display: flex;
        align-items: center;
        gap: 6px;
    }
    .online-dot{
        width: 8px;
        height: 8px;
        background: #4ade80;
        border-radius: 50%;
        box-shadow: 0 0 10px #4ade80;
        animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse{
        0%, 100%{ opacity: 1; }
        50%{ opacity: 0.5; }
    }
    .navbar-right{
        display: flex;
        align-items: center;
        gap: 10px;
        flex-shrink: 0;
        flex-wrap: nowrap;
    }
    @media (max-width: 768px){
        .navbar-right{
            gap: 5px;
        }
        .navbar-title{
            font-size: 16px;
        }
        .navbar-time{
            font-size: 11px;
        }
        .navbar-online{
            font-size: 11px;
        }
    }
    .nav-btn{
        padding: 6px 12px;
        font-size: 13px;
        font-weight: bold;
        font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        color: #0f172a;
        border: none;
        border-radius: 20px;
        cursor: pointer;
        text-decoration: none;
        box-shadow: 0 0 10px rgba(135, 206, 235, 0.6);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        white-space: nowrap;
    }
    .nav-btn:hover{
        transform: scale(1.05);
        box-shadow: 0 0 20px rgba(135, 206, 235, 0.8);
    }
    .nav-btn:active{
        transform: scale(0.95);
    }
    /* 主题切换、音乐按钮 */
    .icon-btn{
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: rgba(15, 23, 42, 0.8);
        border: 1px solid var(--border-color);
        color: var(--accent-cyan);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }
    .icon-btn:hover{
        border-color: var(--accent-cyan);
        box-shadow: 0 0 15px rgba(135, 206, 235, 0.3);
        transform: scale(1.1);
    }

    /* ===== 其他原有样式 ===== */
    .avatar-wrapper{
        position: relative;
        display: inline-block;
        margin-top: 80px;
    }
    .typewriter-text{
        position: absolute;
        top: -60px;
        left: 50%;
        transform: translateX(-50%);
        color: var(--text-primary);
        font-size: 28px;
        font-weight: bold;
        text-shadow: 
            0 0 10px rgba(255,255,255,0.8),
            0 0 20px rgba(255,255,255,0.6),
            0 0 40px rgba(76, 169, 250,0.8),
            0 0 80px rgba(76, 169, 250,0.6);
        white-space: nowrap;
        overflow: hidden;
        border-right: 3px solid var(--text-primary);
        animation: blinkCursor 0.8s step-end infinite;
        letter-spacing: 4px;
    }
    @keyframes blinkCursor{
        0%,100%{border-color: var(--text-primary);}
        50%{border-color: transparent;}
    }
    img{
        border-radius: 50%;
        border:4px solid rgba(76, 169, 250,0.8);
        width:auto;
        height: auto;
        object-fit: cover;
        box-shadow: 
            0 0 20px rgb(76, 169, 250),
            0 0 40px rgba(76, 169, 250,0.6),
            0 0 60px rgba(76, 169, 250,0.4),
            0 0 100px rgba(76, 169, 250,0.2);
        transition: box-shadow 0.3s ease, border-color 0.3s ease;
    }
    img:hover{
        border-color: rgb(224, 207, 16);
        box-shadow: 
            0 0 20px rgb(224, 207, 16),
            0 0 40px rgba(224, 207, 16,0.6),
            0 0 60px rgba(224, 207, 16,0.4),
            0 0 100px rgba(224, 207, 16,0.2);
    }
    img:active{
        transform: scale(0.95);
    }
    @media (max-width: 768px){
        img{
            max-width: 80vw;
            height: auto;
        }
        .typewriter-text{
            font-size: 20px;
            top: -50px;
        }
        h1{
            font-size: 24px;
        }
        h2{
            font-size: 18px;
        }
        .glow-button{
            padding: 12px 30px;
            font-size: 16px;
        }
    }
    @media (max-width: 480px){
        img{
            max-width: 60vw;
        }
        .typewriter-text{
            font-size: 16px;
            letter-spacing: 2px;
        }
    }
    @keyframes leftRightMove{
        0%{transform: translateX(30px);}
        100%{transform: translateX(-30px);}
    }
    a{
        text-decoration: none;
    }
    a h1{
        margin-top: 60px;
        animation: leftRightMove 2s ease-in-out infinite alternate;
        color: rgb(35, 164, 224);
        text-shadow: 0 0 40px rgb(35, 164, 224);
    }
    #rainCanvas{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
    }
    .AlertPlus{
        background-color: black;
        color:red;
        position: fixed;
        left: 50%;
        top: 50%;
        border:2px solid red;
        box-shadow: 0 0 20px red;
        padding: 10px 20px;
        font-weight: bold;
        border-radius: 5px;
        transform: scale(0.1);
        opacity: 0;
        transition: all 0.5s;
        z-index: 10000;
        pointer-events: auto;
        cursor: pointer;
    }
    .glow-button{
        margin-top: 40px;
        padding: 15px 40px;
        font-size: 18px;
        font-weight: bold;
        font-family: inherit;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        color: #0f172a;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        position: relative;
        overflow: hidden;
        box-shadow: 
            0 0 20px rgba(135, 206, 235, 0.6),
            0 0 40px rgba(135, 206, 235, 0.4),
            0 0 60px rgba(135, 206, 235, 0.2);
        animation: pulseGlow 2s ease-in-out infinite;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
    }
    .glow-button:hover{
        transform: scale(1.05);
        box-shadow: 
            0 0 30px rgba(135, 206, 235, 0.8),
            0 0 60px rgba(135, 206, 235, 0.6),
            0 0 90px rgba(135, 206, 235, 0.4);
    }
    .glow-button:active{
        transform: scale(0.95);
    }
    .glow-button::before{
        content: '';
        position: absolute;
        top: -50%;
        left: -50%;
        width: 200%;
        height: 200%;
        background: linear-gradient(
            45deg,
            transparent,
            rgba(255, 255, 255, 0.3),
            transparent
        );
        transform: rotate(45deg);
        animation: shimmer 3s infinite;
    }
    @keyframes pulseGlow{
        0%, 100%{
            box-shadow: 0 0 20px rgba(135, 206, 235, 0.6), 0 0 40px rgba(135, 206, 235, 0.4), 0 0 60px rgba(135, 206, 235, 0.2);
        }
        50%{
            box-shadow: 0 0 30px rgba(135, 206, 235, 0.8), 0 0 50px rgba(135, 206, 235, 0.6), 0 0 80px rgba(135, 206, 235, 0.4);
        }
    }
    @keyframes shimmer{
        0%{ transform: translateX(-100%) rotate(45deg); }
        100%{ transform: translateX(100%) rotate(45deg); }
    }
    .modal-overlay{
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.7);
        backdrop-filter: blur(5px);
        z-index: 1000;
        justify-content: center;
        align-items: center;
        animation: fadeIn 0.3s ease;
    }
    .modal-content{
        display: block;
        background: var(--card-bg);
        border: 2px solid rgba(135, 206, 235, 0.5);
        border-radius: 20px;
        padding: 40px;
        max-width: 500px;
        width: 90%;
        position: relative;
        box-shadow: 0 0 30px rgba(135, 206, 235, 0.3), 0 0 60px rgba(135, 206, 235, 0.1);
        animation: slideUp 0.3s ease;
        text-align: center;
        color: var(--text-primary);
        transition: background 0.5s;
    }
    .modal-content h2{
        color: var(--accent-cyan);
        text-shadow: 0 0 20px rgba(135, 206, 235, 0.5);
        margin-bottom: 20px;
    }
    .modal-content p{
        margin: 15px 0;
        line-height: 1.6;
        color: var(--text-secondary);
    }
    .modal-content ul{
        text-align: left;
        list-style: none;
        padding: 0 20px;
        margin: 20px 0;
    }
    .modal-content ul li{
        padding: 8px 0;
        color: var(--text-muted);
        position: relative;
        padding-left: 25px;
    }
    .modal-content ul li::before{
        content: ">";
        position: absolute;
        left: 0;
        color: var(--accent-cyan);
        font-weight: bold;
    }
    .modal-close{
        position: absolute;
        top: 15px;
        right: 20px;
        background: none;
        border: none;
        color: var(--text-dim);
        font-size: 30px;
        cursor: pointer;
        transition: all 0.3s ease;
        line-height: 1;
        padding: 0;
        width: 30px;
        height: 30px;
    }
    .modal-close:hover{
        color: var(--accent-cyan);
        transform: rotate(90deg);
        text-shadow: 0 0 10px rgba(135, 206, 235, 0.5);
    }
    @keyframes fadeIn{
        from{ opacity: 0; }
        to{ opacity: 1; }
    }
    @keyframes slideUp{
        from{ opacity: 0; transform: translateY(50px) scale(0.9); }
        to{ opacity: 1; transform: translateY(0) scale(1); }
    }
    @media (max-width: 768px){
        .modal-content{
            padding: 30px 20px;
        }
        .modal-content h2{
            font-size: 20px;
        }
    }
    .visitor-count{
        margin-top: 30px;
        color: var(--text-dim);
        font-size: 16px;
        letter-spacing: 1px;
        text-shadow: 0 0 10px rgba(135, 206, 235, 0.3);
    }
    .visitor-count .count-number{
        color: var(--accent-cyan);
        font-weight: bold;
        font-size: 20px;
        text-shadow: 0 0 15px rgba(135, 206, 235, 0.6);
        margin: 0 5px;
    }

    /* ===== 随机名言 ===== */
    .quote-section{
        margin: 40px auto;
        max-width: 600px;
        padding: 0 20px;
    }
    .quote-box{
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        border-radius: 15px;
        padding: 25px 30px;
        position: relative;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
    }
    .quote-box:hover{
        border-color: rgba(135, 206, 235, 0.6);
        box-shadow: 0 0 25px rgba(135, 206, 235, 0.2);
    }
    .quote-text{
        font-size: 18px;
        color: var(--text-secondary);
        line-height: 1.8;
        margin-bottom: 10px;
        font-style: italic;
    }
    .quote-text::before{
        content: '"';
        font-size: 40px;
        color: var(--accent-cyan);
        opacity: 0.5;
        position: absolute;
        top: 5px;
        left: 12px;
    }
    .quote-author{
        font-size: 14px;
        color: var(--text-dim);
        text-align: right;
    }
    .quote-refresh{
        background: none;
        border: none;
        color: var(--accent-cyan);
        cursor: pointer;
        font-size: 20px;
        position: absolute;
        top: 10px;
        right: 15px;
        transition: transform 0.3s ease;
        opacity: 0.6;
    }
    .quote-refresh:hover{
        transform: rotate(180deg) scale(1.2);
        opacity: 1;
    }

    /* ===== 滚动进度条 ===== */
    .progress-bar{
        position: fixed;
        top: 60px;
        left: 0;
        width: 0%;
        height: 3px;
        background: linear-gradient(90deg, var(--accent-cyan), var(--accent-gold));
        z-index: 9998;
        transition: width 0.1s linear;
        box-shadow: 0 0 10px var(--accent-cyan);
    }

    /* ===== 回到顶部 ===== */
    .back-to-top{
        position: fixed;
        bottom: 80px;
        right: 20px;
        width: 45px;
        height: 45px;
        border-radius: 50%;
        background: var(--bg-card);
        border: 1px solid var(--border-color);
        color: var(--accent-cyan);
        font-size: 20px;
        cursor: pointer;
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 9997;
        transition: all 0.3s ease;
        backdrop-filter: blur(10px);
        box-shadow: 0 0 15px rgba(135, 206, 235, 0.2);
    }
    .back-to-top:hover{
        transform: scale(1.1);
        border-color: var(--accent-cyan);
        box-shadow: 0 0 25px rgba(135, 206, 235, 0.4);
    }
    .back-to-top.show{
        display: flex;
        animation: slideUp 0.3s ease;
    }

    /* ===== 音乐播放器 ===== */
    .music-player{
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--navbar-bg);
        backdrop-filter: blur(15px);
        border: 1px solid var(--border-color);
        border-radius: 50px;
        padding: 8px 20px;
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 9996;
        box-shadow: 0 0 30px rgba(135, 206, 235, 0.2);
        transition: all 0.5s;
        max-width: 90vw;
    }
    .music-btn{
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, #87CEEB, #ADD8E6);
        border: none;
        color: #0f172a;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 14px;
        transition: all 0.3s ease;
        flex-shrink: 0;
    }
    .music-btn:hover{
        transform: scale(1.1);
    }
    .music-info{
        color: var(--text-secondary);
        font-size: 13px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
    }
    .music-progress{
        width: 60px;
        height: 4px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
    }
    .music-progress-fill{
        height: 100%;
        background: linear-gradient(90deg, #87CEEB, #ADD8E6);
        border-radius: 2px;
        transition: width 0.1s linear;
        width: 0%;
    }
    .music-volume{
        width: 50px;
        height: 4px;
        background: rgba(255,255,255,0.2);
        border-radius: 2px;
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
    }
    .music-volume-fill{
        height: 100%;
        background: linear-gradient(90deg, #87CEEB, #ADD8E6);
        border-radius: 2px;
        width: 70%;
    }
    .music-time{
        color: var(--text-dim);
        font-size: 11px;
        font-family: 'Courier New', monospace;
        flex-shrink: 0;
    }

    /* ===== 鼠标粒子 Canvas ===== */
    #particleCanvas{
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        z-index: -1;
        pointer-events: none;
    }

    .main-content{
        margin-top: 80px;
        position: relative;
        z-index: 1;
    }
</style>
<body>
    <!-- 滚动进度条 -->
    <div class="progress-bar" id="progressBar"></div>

    <!-- 导航栏 -->
    <div class="navbar">
        <div class="navbar-title">AP 主页</div>
        <div class="navbar-right">
            <button class="icon-btn" onclick="toggleTheme()" title="切换主题" id="themeBtn">🌙</button>
            <a href="links/" class="nav-btn">🔗 导航</a>
            <a href="gallery/" class="nav-btn">📸 画廊</a>
            <a href="games/" class="nav-btn">🎮 游戏</a>
            <a href="chat/" class="nav-btn">🤖 AI</a>
            <a href="time/" class="nav-btn">⏰ 时光</a>
            <a href="weather/" class="nav-btn">🌤️ 天气</a>
            <a href="messages/" class="nav-btn">💬 留言</a>
            <a href="stats/" class="nav-btn">📊 统计</a>
            <div class="navbar-online" id="navbarOnline"><span class="online-dot"></span>加载中</div>
            <div class="navbar-time" id="navbarTime"></div>
        </div>
    </div>

    <div class="progress-bar" id="progressBar"></div>

    <div class="main-content">
    <h1>😊欢迎😊</h1>
    <h2>😱很多内容😱</h2> 
    <canvas id="rainCanvas"></canvas>
    <canvas id="particleCanvas"></canvas>
    <div class="avatar-wrapper">
        <div class="typewriter-text" id="typewriter"></div>
        <img src="head.png" width="300" onclick="hackerAttack()" alt="点击触发特效">
    </div>

    <a href="https://www.github.com">
        <h1>🎯 探索 Github 🎯</h1>

<script>
    // ========== 配置常量 ==========
    const CONFIG = {
        RAIN: { dropCount: 120, windOffset: 0.15 },
        TYPEWRITER: { typeSpeed: 150, deleteSpeed: 80, pauseTime: 1500 },
        HACKER: { alertCount: 100, autoRemoveMinDelay: 3000, autoRemoveMaxDelay: 5000, cooldownTime: 2500 }
    };

    // ========== 下雨效果 ==========
    const canvas = document.getElementById('rainCanvas');
    const ctx = canvas.getContext('2d');
    let drops = [];
    let isAttacking = false;
    let lastTime = 0;

    function resizeCanvas(){
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    function createRaindrops(){
        drops = [];
        for(let i = 0; i < CONFIG.RAIN.dropCount; i++){
            drops.push({
                x: Math.random() * canvas.width,
                y: Math.random() * canvas.height * -1,
                length: Math.random() * 25 + 20,
                speed: Math.random() * 150 + 100,
                opacity: Math.random() * 0.4 + 0.3
            });
        }
    }
    function updateRain(deltaTime){
        const deltaSeconds = deltaTime / 1000;
        for(const drop of drops){
            drop.y += drop.speed * deltaSeconds;
            if(drop.y > canvas.height + 20){
                drop.y = -drop.length;
                drop.x = Math.random() * canvas.width;
            }
        }
    }
    function drawRain(){
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for(const drop of drops){
            ctx.beginPath();
            ctx.moveTo(drop.x, drop.y);
            ctx.lineTo(drop.x, drop.y + drop.length);
            ctx.strokeStyle = `rgba(174, 194, 224, ${drop.opacity})`;
            ctx.lineWidth = 1.5;
            ctx.stroke();
        }
    }
    function animateRain(currentTime){
        if(!lastTime) lastTime = currentTime;
        const deltaTime = currentTime - lastTime;
        lastTime = currentTime;
        updateRain(deltaTime);
        drawRain();
        requestAnimationFrame(animateRain);
    }
    window.addEventListener('resize', () => { resizeCanvas(); createRaindrops(); });
    resizeCanvas();
    createRaindrops();
    requestAnimationFrame(animateRain);

    // ========== 打字机效果 ==========
    const typewriterEl = document.getElementById('typewriter');
    const texts = ['欢迎！', '太棒了！'];
    let textIndex = 0;
    let charIndex = 0;
    let isDeleting = false;

    function typeEffect(){
        const currentText = texts[textIndex];
        if(isDeleting){
            charIndex--;
            typewriterEl.textContent = currentText.substring(0, charIndex);
        }else{
            charIndex++;
            typewriterEl.textContent = currentText.substring(0, charIndex);
        }
        let delay = isDeleting ? CONFIG.TYPEWRITER.deleteSpeed : CONFIG.TYPEWRITER.typeSpeed;
        if(!isDeleting && charIndex === currentText.length){
            delay = CONFIG.TYPEWRITER.pauseTime;
            isDeleting = true;
        }else if(isDeleting && charIndex === 0){
            isDeleting = false;
            textIndex = (textIndex + 1) % texts.length;
            delay = 500;
        }
        setTimeout(typeEffect, delay);
    }
    typeEffect();

    // ========== 恶搞逻辑 ==========
    const alertBoxes = [];
    function hackerAttack(){
        if(isAttacking) return;
        isAttacking = true;
        const n = CONFIG.HACKER.alertCount;
        for(let i = 1; i <= n; i++){
            setTimeout(() =>{
                let box = document.createElement("div");
                box.innerText = "⚠️⚠️⚠️SYSTEM BREACH!⚠️⚠️⚠️";
                document.body.appendChild(box);
                box.className = "AlertPlus";
                alertBoxes.push(box);
                box.offsetHeight;
                box.style.left = (Math.random() * 100) + "%";
                box.style.top = (Math.random() * 100) + "%";
                box.style.opacity = "1";
                box.style.transform = `scale(${Math.random() + 0.5}) rotate(${Math.random() * 60 - 30}deg)`;
                box.onclick = function() { removeAlertBox(box); };
                const autoRemoveDelay = CONFIG.HACKER.autoRemoveMinDelay +
                    Math.random() * (CONFIG.HACKER.autoRemoveMaxDelay - CONFIG.HACKER.autoRemoveMinDelay);
                setTimeout(() => { removeAlertBox(box); }, autoRemoveDelay);
            }, i*20);
        }
        setTimeout(() => { isAttacking = false; }, CONFIG.HACKER.cooldownTime);
    }
    function removeAlertBox(box){
        const index = alertBoxes.indexOf(box);
        if(index !== -1) alertBoxes.splice(index, 1);
        box.style.opacity = "0";
        box.style.transform = "scale(0.1)";
        setTimeout(() => { if(box.parentNode) box.parentNode.removeChild(box); }, 500);
    }
    function clearAllAlerts(){
        while(alertBoxes.length > 0) removeAlertBox(alertBoxes[0]);
    }
    function openModal(){
        document.getElementById('infoModal').style.display = 'flex';
        document.body.style.overflow = 'hidden';
    }
    function closeModal(){
        document.getElementById('infoModal').style.display = 'none';
        document.body.style.overflow = 'auto';
    }
    function closeModalOutside(event){
        if(event.target.id === 'infoModal') closeModal();
    }
    document.addEventListener('keydown', function(event){
        if(event.key === 'Escape') closeModal();
    });

    // ========== 访客计数 ==========
    async function updateVisitorCount(){
        const countEl = document.getElementById('visitorCount');
        try {
            const res = await fetch('/api/visitor', { cache: 'no-store' });
            if (!res.ok) throw new Error('API error');
            let data;
            try { data = await res.json(); }
            catch (e) { throw new Error('JSON parse error'); }
            countEl.textContent = data.count.toLocaleString();
        } catch (e) {
            const stored = localStorage.getItem('visitorCount');
            let count = stored ? parseInt(stored) : 0;
            const hasVisited = sessionStorage.getItem('hasVisited');
            if (!hasVisited) { count++; localStorage.setItem('visitorCount', count); sessionStorage.setItem('hasVisited', 'true'); }
            countEl.textContent = count.toLocaleString();
            if (!document.getElementById('busuanzi_script')) {
                const script = document.createElement('script');
                script.id = 'busuanzi_script';
                script.src = 'https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js';
                script.async = true;
                script.onload = function(){
                    let timedOut = false;
                    const timeoutId = setTimeout(() => { timedOut = true; if (countEl.textContent === '--') { const s = localStorage.getItem('visitorCount'); countEl.textContent = s || '0'; } }, 8000);
                    const checkCount = setInterval(() => {
                        if (timedOut) { clearInterval(checkCount); return; }
                        const c = document.getElementById('busuanzi_value_site_uv');
                        if (c && c.textContent && c.textContent !== '...') { countEl.textContent = c.textContent; clearInterval(checkCount); clearTimeout(timeoutId); }
                    }, 200);
                };
                if (!document.getElementById('busuanzi_container_site_uv')) {
                    const hiddenSpan = document.createElement('span');
                    hiddenSpan.id = 'busuanzi_container_site_uv';
                    hiddenSpan.style.display = 'none';
                    hiddenSpan.innerHTML = '<span id="busuanzi_value_site_uv"></span>';
                    document.body.appendChild(hiddenSpan);
                }
                document.head.appendChild(script);
            }
        }
    }
    updateVisitorCount();

    // ========== 实时时间 ==========
    function updateTime(){
        const now = new Date();
        const h = String(now.getHours()).padStart(2, '0');
        const m = String(now.getMinutes()).padStart(2, '0');
        const s = String(now.getSeconds()).padStart(2, '0');
        const mo = String(now.getMonth()+1).padStart(2, '0');
        const d = String(now.getDate()).padStart(2, '0');
        document.getElementById('navbarTime').textContent = `${mo}/${d} ${h}:${m}:${s}`;
    }
    updateTime();
    setInterval(updateTime, 1000);

    // ========== 在线人数 ==========
    const userId = localStorage.getItem('online_user_id') || 'user_' + Math.random().toString(36).substr(2, 10);
    localStorage.setItem('online_user_id', userId);
    async function updateOnlineCount(){
        try {
            const res = await fetch('/api/online-users', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ userId }) });
            const data = await res.json();
            const count = data.count || 1;
            document.getElementById('navbarOnline').innerHTML = `<span class="online-dot"></span>在线 ${count} 人`;
        } catch(e){
            document.getElementById('navbarOnline').innerHTML = `<span class="online-dot"></span>在线 1 人`;
        }
    }
    updateOnlineCount();
    setInterval(updateOnlineCount, 20000);

    // ==================== 新功能 ====================

    // ===== 1. 鼠标粒子特效 =====
    (function(){
        const pCanvas = document.getElementById('particleCanvas');
        const pCtx = pCanvas.getContext('2d');
        let particles = [];
        let mouseX = -1000, mouseY = -1000;

        function resizePCanvas(){
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
        }

        function createParticle(x, y){
            const hue = Math.random() * 60 + 180; // 蓝-青色系
            return {
                x, y,
                vx: (Math.random() - 0.5) * 3,
                vy: (Math.random() - 0.5) * 3,
                size: Math.random() * 4 + 2,
                life: 1,
                decay: Math.random() * 0.02 + 0.01,
                hue: hue,
                sat: 80 + Math.random() * 20
            };
        }

        function animateParticles(){
            pCtx.clearRect(0, 0, pCanvas.width, pCanvas.height);
            // 生成新粒子
            if(Math.random() < 0.6){
                particles.push(createParticle(
                    mouseX + (Math.random() - 0.5) * 20,
                    mouseY + (Math.random() - 0.5) * 20
                ));
            }
            // 更新和绘制
            for(let i = particles.length - 1; i >= 0; i--){
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.life -= p.decay;
                if(p.life <= 0){ particles.splice(i, 1); continue; }
                pCtx.beginPath();
                pCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                pCtx.fillStyle = `hsla(${p.hue}, ${p.sat}%, 70%, ${p.life * 0.8})`;
                pCtx.fill();
            }
            // 限制粒子数量
            if(particles.length > 200) particles.splice(0, particles.length - 200);
            requestAnimationFrame(animateParticles);
        }

        document.addEventListener('mousemove', function(e){
            mouseX = e.clientX;
            mouseY = e.clientY;
        });
        // 触屏支持
        document.addEventListener('touchmove', function(e){
            const touch = e.touches[0];
            if(touch){
                mouseX = touch.clientX;
                mouseY = touch.clientY;
            }
        });

        resizePCanvas();
        window.addEventListener('resize', resizePCanvas);
        // 初始生成一些粒子
        for(let i = 0; i < 30; i++){
            particles.push(createParticle(
                Math.random() * window.innerWidth,
                Math.random() * window.innerHeight
            ));
        }
        requestAnimationFrame(animateParticles);
    })();

    // ===== 2. 点击烟花特效 =====
    (function(){
        const fCanvas = document.createElement('canvas');
        fCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9995;';
        fCanvas.id = 'fireworkCanvas';
        document.body.appendChild(fCanvas);
        const fCtx = fCanvas.getContext('2d');
        let fireworks = [];
        let fW, fH;

        function resizeFCanvas(){
            fW = window.innerWidth;
            fH = window.innerHeight;
            fCanvas.width = fW;
            fCanvas.height = fH;
        }

        function createFirework(x, y){
            const color = `hsl(${Math.random() * 360}, 100%, 60%)`;
            const count = 30 + Math.floor(Math.random() * 20);
            const particles = [];
            for(let i = 0; i < count; i++){
                const angle = (Math.PI * 2 / count) * i + (Math.random() - 0.5) * 0.3;
                const speed = 2 + Math.random() * 4;
                particles.push({
                    x, y,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    life: 1,
                    decay: 0.015 + Math.random() * 0.015,
                    size: 2 + Math.random() * 2,
                    color
                });
            }
            fireworks.push(...particles);
        }

        function animateFireworks(){
            fCtx.clearRect(0, 0, fW, fH);
            for(let i = fireworks.length - 1; i >= 0; i--){
                const p = fireworks[i];
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.04; // 重力
                p.life -= p.decay;
                if(p.life <= 0){ fireworks.splice(i, 1); continue; }
                fCtx.globalAlpha = p.life;
                fCtx.beginPath();
                fCtx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                fCtx.fillStyle = p.color;
                fCtx.fill();
            }
            fCtx.globalAlpha = 1;
            if(fireworks.length > 0) requestAnimationFrame(animateFireworks);
        }

        document.addEventListener('click', function(e){
            if(e.target.closest('.navbar') || e.target.closest('.music-player') || e.target.closest('.back-to-top')) return;
            createFirework(e.clientX, e.clientY);
            if(fireworks.length <= 50) requestAnimationFrame(animateFireworks);
            else animateFireworks();
        });

        resizeFCanvas();
        window.addEventListener('resize', resizeFCanvas);
    })();

    // ===== 3. 主题切换 =====
    let currentTheme = localStorage.getItem('theme') || 'dark';
    document.body.classList.add('dark-theme');

    function toggleTheme(){
        if(currentTheme === 'dark'){
            document.body.className = 'light-theme';
            currentTheme = 'light';
            document.getElementById('themeBtn').textContent = '☀️';
        } else if(currentTheme === 'light'){
            document.body.className = 'cyber-theme';
            currentTheme = 'cyber';
            document.getElementById('themeBtn').textContent = '💜';
        } else {
            document.body.className = '';
            currentTheme = 'dark';
            document.getElementById('themeBtn').textContent = '🌙';
        }
        localStorage.setItem('theme', currentTheme);
    }

    // 恢复主题
    if(currentTheme === 'light'){
        document.body.className = 'light-theme';
        document.getElementById('themeBtn').textContent = '☀️';
    } else if(currentTheme === 'cyber'){
        document.body.className = 'cyber-theme';
        document.getElementById('themeBtn').textContent = '💜';
    }

    // ===== 4. 滚动进度条 =====
    window.addEventListener('scroll', function(){
        const scrollTop = document.documentElement.scrollTop || document.body.scrollTop;
        const scrollHeight = document.documentElement.scrollHeight - document.documentElement.clientHeight;
        const progress = scrollHeight > 0 ? (scrollTop / scrollHeight) * 100 : 0;
        document.getElementById('progressBar').style.width = progress + '%';
    });

    // ===== 5. 回到顶部 =====
    window.addEventListener('scroll', function(){
        const btn = document.getElementById('backToTop');
        if(window.scrollY > 400){
            btn.classList.add('show');
        } else {
            btn.classList.remove('show');
        }
    });

    function scrollToTop(){
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ===== 6. 随机名言 =====
    const quotes = [
        { text: '代码是写给人看的，顺便能在机器上运行。', author: 'Harold Abelson' },
        { text: '在编程中，唯一不变的就是变化。', author: '佚名' },
        { text: '任何傻瓜都能写出计算机能理解的代码。优秀的程序员写出的是人类能理解的代码。', author: 'Martin Fowler' },

        { text: '程序必须是为了给人阅读而写，顺便才是给机器执行。', author: 'Harold Abelson' },

        { text: '把每一件简单的事做好就是不简单，把每一件平凡的事做好就是不平凡。', author: '张瑞敏' },
        { text: '学而不思则罔，思而不学则殆。', author: '孔子' },
        { text: '千里之行，始于足下。', author: '老子' },
        { text: '生活就像一盒巧克力，你永远不知道下一颗是什么味道。', author: '阿甘正传' },
        { text: '坚持下去，不是因为坚强，而是别无选择。', author: '佚名' },
        { text: '创新就是创造性地破坏。', author: 'Joseph Schumpeter' },

        { text: '失败是成功之母，成功是失败之父。', author: '佚名' },
        { text: 'Talk is cheap. Show me the code.', author: 'Linus Torvalds' },
        { text: 'Stay hungry, stay foolish.', author: 'Steve Jobs' },
        { text: 'Hello, World!', author: 'Brian Kernighan' },
        { text: '人生苦短，我用 Python。', author: '编程圈名言' },

    function refreshQuote(){
        const q = quotes[Math.floor(Math.random() * quotes.length)];
        document.getElementById('quoteText').textContent = q.text;
        document.getElementById('quoteAuthor').textContent = '—— ' + q.author;
        // 保存到 localStorage 以便其他页面共享
        localStorage.setItem('lastQuote', JSON.stringify(q));
    }

    // 加载名言（优先恢复上次的）
    (function(){
        const saved = localStorage.getItem('lastQuote');
        if(saved){
            try {
                const q = JSON.parse(saved);
                document.getElementById('quoteText').textContent = q.text;
                document.getElementById('quoteAuthor').textContent = '—— ' + q.author;
                return;
            } catch(e) {}
        }
        refreshQuote();
    })();

    // 每60秒自动刷新名言
    setInterval(refreshQuote, 60000);

    // ===== 7. 音乐播放器 =====
    const playlist = [
        { title: '起风了', url: 'https://music.163.com/song/media/outer/url?id=1330348068.mp3' },
        { title: '夜曲', url: 'https://music.163.com/song/media/outer/url?id=65530.mp3' },
        { title: '晴天', url: 'https://music.163.com/song/media/outer/url?id=186016.mp3' },
        { title: '稻香', url: 'https://music.163.com/song/media/outer/url?id=186015.mp3' },
        { title: '平凡之路', url: 'https://music.163.com/song/media/outer/url?id=33475389.mp3' },
        { title: '光年之外', url: 'https://music.163.com/song/media/outer/url?id=471200438.mp3' }
    ];
    let currentTrack = parseInt(localStorage.getItem('currentTrack')) || 0;
    let isPlaying = false;
    const audio = document.getElementById('bgMusic');

    function loadTrack(index){
        if(index < 0) index = playlist.length - 1;
        if(index >= playlist.length) index = 0;
        currentTrack = index;
        localStorage.setItem('currentTrack', currentTrack);
        audio.src = playlist[currentTrack].url;
        document.getElementById('musicInfo').textContent = playlist[currentTrack].title;
        if(isPlaying){
            audio.play().catch(() => {
                isPlaying = false;
                document.getElementById('musicPlayBtn').textContent = '▶';
            });
        }
        updateMusicTime();
    }

    function toggleMusic(){
        if(audio.src === '' || audio.src === window.location.href){
            loadTrack(currentTrack);
        }
        if(isPlaying){
            audio.pause();
            isPlaying = false;
            document.getElementById('musicPlayBtn').textContent = '▶';
        } else {
            audio.play().catch(() => {
                // 可能需要用户交互
                isPlaying = false;
                document.getElementById('musicPlayBtn').textContent = '▶';
            });
            isPlaying = true;
            document.getElementById('musicPlayBtn').textContent = '⏸';
        }
    }

    function prevMusic(){
        loadTrack(currentTrack - 1);
    }

    function nextMusic(){
        loadTrack(currentTrack + 1);
    }

    function updateMusicTime(){
        const current = audio.currentTime || 0;
        const duration = audio.duration || 0;
        const minC = Math.floor(current / 60);
        const secC = Math.floor(current % 60);
        const minD = Math.floor(duration / 60);
        const secD = Math.floor(duration % 60);
        document.getElementById('musicTime').textContent =
            `${String(minC).padStart(2, '0')}:${String(secC).padStart(2, '0')} / ${duration ? `${String(minD).padStart(2, '0')}:${String(secD).padStart(2, '0')}` : '--:--'}`;
        if(duration > 0){
            document.getElementById('musicProgressFill').style.width = (current / duration * 100) + '%';
        }
    }

    function setMusicProgress(e){
        const rect = e.currentTarget.getBoundingClientRect();
        const x = (e.clientX - rect.left) / rect.width;
        if(audio.duration){
            audio.currentTime = x * audio.duration;
        }
    }

    function setMusicVolume(e){
        const rect = e.currentTarget.getBoundingClientRect();
        const x = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
        audio.volume = x;
        document.getElementById('musicVolumeFill').style.width = (x * 100) + '%';
        localStorage.setItem('musicVolume', x);
    }

    // 恢复音量
    const savedVolume = parseFloat(localStorage.getItem('musicVolume')) || 0.7;
    audio.volume = savedVolume;
    document.getElementById('musicVolumeFill').style.width = (savedVolume * 100) + '%';

    audio.addEventListener('timeupdate', updateMusicTime);
    audio.addEventListener('loadedmetadata', updateMusicTime);
    audio.addEventListener('ended', nextMusic);
    audio.addEventListener('error', function(){
        document.getElementById('musicInfo').textContent = '加载失败，点击切换';
        if(isPlaying){
            isPlaying = false;
            document.getElementById('musicPlayBtn').textContent = '▶';
        }
    });

    // 键盘快捷键
    document.addEventListener('keydown', function(e){
        if(e.key === ' ' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA'){
            e.preventDefault();
            toggleMusic();
        }
        if(e.key === 'ArrowRight' && (e.ctrlKey || e.metaKey)) nextMusic();
        if(e.key === 'ArrowLeft' && (e.ctrlKey || e.metaKey)) prevMusic();
    });
</script>
</body>
</html>
